<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Seoul Moon🌙 Ultimate Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --sailor-pink: #FF99CC; --sailor-purple: #B19CD9; --sailor-blue: #5D9CEC; --deep-pink: #FF6699; --glow: rgba(255, 182, 193, 0.4); --naver-green: #03C75A; --brown: #4D3B3B; }
        * { box-sizing: border-box; font-family: 'PingFang SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #FFF5F9 0%, #F0F4FF 100%); margin: 0; padding: env(safe-area-inset-top) 15px 120px 15px; min-height: 100vh; overflow-x: hidden; }

        /* Logo 动效 */
        .sm-logo-wrap { position: relative; text-align: center; margin: 15px 0 25px; }
        .sm-title { font-family: 'Dancing Script', cursive; font-size: 52px; color: #FFFFFF; text-shadow: -3px 3px 0px rgba(209, 179, 255, 0.8), 3px -1px 0px rgba(255, 153, 204, 0.7); animation: titleBreath 3s infinite alternate; cursor: pointer; display: inline-block; position: relative; z-index: 2; }
        @keyframes titleBreath { from { transform: scale(1); } to { transform: scale(1.02); } }
        .sm-title::after { content: ''; position: absolute; width: 80px; height: 2px; background: linear-gradient(90deg, white, transparent); top: 15px; right: -60px; transform: rotate(-45deg); animation: meteor 4s linear infinite; }
        @keyframes meteor { 0% { right: -60px; top: -10px; opacity: 1; } 20% { right: 150px; top: 80px; opacity: 0; } 100% { opacity: 0; } }

        .hidden { display: none !important; }
        .dash-board { background: rgba(255, 255, 255, 0.7); border: 2.5px solid white; border-radius: 30px; padding: 18px; box-shadow: 0 8px 25px var(--glow); backdrop-filter: blur(10px); margin-bottom: 25px; }
        .weather-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 5px 0; scrollbar-width: none; }
        .w-item { min-width: 80px; text-align: center; background: white; padding: 12px 5px; border-radius: 20px; border: 1.5px solid #FFE4E1; flex-shrink: 0; }

        /* 导航 */
        .nav-stack { display: flex; flex-direction: column; gap: 15px; }
        .nav-btn { border-radius: 25px; padding: 22px; text-align: center; box-shadow: 0 6px 15px var(--glow); cursor: pointer; transition: 0.2s; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .nav-pink-bar { background: linear-gradient(90deg, #FF99CC, #FF6699) !important; color: white !important; }
        .nav-white-btn { background: white !important; border: 1.5px solid #FFE4E1 !important; color: var(--brown); }
        .nav-row-half { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* 航班大卡片 */
        .flight-container { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px 25px; scrollbar-width: none; width: 100vw; margin-left: -15px; padding-left: 15px; }
        .f-card { flex: 0 0 88%; background: white; border: 4px solid var(--sailor-blue); border-radius: 30px; padding: 25px; box-shadow: 10px 10px 0px var(--sailor-blue); position: relative; flex-shrink: 0; transition: 0.2s; }
        .f-card.add-btn { background: rgba(255,255,255,0.4); border: 2.5px dashed #CCC; box-shadow: none; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #AAA; min-height: 180px; }
        .d-day-badge { position: absolute; top: 20px; right: 20px; background: var(--sailor-pink); color: white; padding: 6px 15px; border-radius: 15px; font-size: 12px; font-weight: 900; }
        .tag-row { display: flex; gap: 8px; margin-top: 20px; border-top: 1.5px dashed #EEE; padding-top: 20px; flex-wrap: wrap; }
        .tag { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 900; background: #F0F6FF; color: var(--high-school-blue); white-space: nowrap; }

        /* 行程长卡片 */
        .timeline-box { position: relative; padding-top: 10px; }
        .timeline-line { position: absolute; left: 42px; top: 0; bottom: 0; border-left: 2.5px dashed var(--sailor-pink); opacity: 0.3; }
        .node-circle { width: 55px; height: 55px; border: 3px solid var(--sailor-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0; z-index: 2; box-shadow: 0 4px 12px var(--glow); overflow: hidden; }
        .list-item-long { background: white; padding: 20px; border-radius: 28px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; position: relative; z-index: 1; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1.5px solid white; }

        /* 药丸选择器 */
        .date-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0 20px; scrollbar-width: none; }
        .date-item { padding: 12px 22px; background: white; border-radius: 22px; color: #999; font-weight: 900; border: 1.5px solid #EEE; flex-shrink: 0; transition: 0.3s; cursor: pointer; }
        .date-item.active { background: var(--sailor-pink); color: white; border-color: var(--sailor-pink); box-shadow: 0 5px 15px var(--glow); transform: scale(1.05); }

        /* 👑 票夹 3D 翻转 + 撕票口视觉彻底回归 👑 */
        .ticket-scene { perspective: 1200px; margin-bottom: 20px; cursor: pointer; }
        .ticket-flip { position: relative; width: 100%; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; }
        .ticket-flip.is-flipped { transform: rotateX(180deg); }
        .ticket-face { -webkit-backface-visibility: hidden; backface-visibility: hidden; width: 100%; display: flex; overflow: visible; }
        
        .ticket-stub { background: white; border: 3px solid var(--high-school-blue); border-radius: 22px; position: relative; padding: 20px 15px 20px 35px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%; display: flex; overflow: visible; }
        .ticket-stub::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 12px; background: var(--high-school-blue); border-radius: 18px 0 0 18px; }
        .ticket-cut { position: absolute; right: 90px; top: 12px; bottom: 12px; border-left: 2.5px dashed #D1E1FF; }
        .ticket-hole { position: absolute; right: 78px; width: 26px; height: 26px; background: #F0F4FF; border-radius: 50%; border: 3px solid var(--high-school-blue); z-index: 5; }
        .hole-t { top: -15px; } .hole-b { bottom: -15px; }
        
        .ticket-back { position: absolute; top: 0; left: 0; transform: rotateX(180deg); background: #FFF0F6; border-color: var(--sailor-pink); flex-direction: column; align-items: center; justify-content: center; -webkit-backface-visibility: hidden; backface-visibility: hidden; }
        .ticket-back::before { background: var(--sailor-pink); }
        .ticket-back .ticket-hole { border-color: var(--sailor-pink); }
        .ticket-back .ticket-cut { border-left: 2.5px dashed #FF99CC; opacity: 0.5; }

        /* 智能识图激光框 */
        .pre-box { position: relative; width: 110px; height: 110px; background: #F8F9FA; border: 3px dashed #DDD; border-radius: 28px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--sailor-pink); box-shadow: 0 0 20px var(--sailor-pink); z-index: 10; display: none; }
        .pre-box.scanning .scan-line { display: block; animation: scanAnim 1.8s infinite linear; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        /* 弹窗层级修复 */
        .drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; align-items: flex-end; z-index: 9000; }
        .drawer.active { display: flex; }
        .drawer-content { background: white; width: 100%; padding: 30px 25px 60px; border-radius: 45px 45px 0 0; max-height: 92vh; overflow-y: auto; animation: slideUp 0.4s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* 药丸选择器强制横向排列 */
        .selector-group { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; scrollbar-width: none; padding: 5px 0; }
        .selector-item { padding: 12px 18px; border: 1.5px solid #EEE; border-radius: 18px; text-align: center; font-size: 11px; cursor: pointer; font-weight: 900; background: white; flex-shrink: 0; min-width: 95px; transition: 0.2s; }
        .selector-item.active { background: var(--brown); color: white; border-color: var(--brown); }

        .f-label { font-size: 13px; font-weight: 900; color: var(--brown); margin: 15px 0 8px; display: block; }
        .f-input { width: 100%; padding: 16px; background: #F8F9FA; border: 1.5px solid #EEE; border-radius: 18px; outline: none; font-size: 15px; margin-bottom: 10px; transition: 0.3s; }
        .f-input:focus { border-color: var(--sailor-pink); background: white; }

        /* 时区滑块胶囊化 */
        .tz-pill-box { display: flex; background: #F0F0F0; border-radius: 15px; padding: 4px; margin-bottom: 15px; gap: 4px; width: 100%; }
        .tz-pill { flex: 1; padding: 10px; border-radius: 12px; text-align: center; font-size: 12px; font-weight: 900; color: #999; cursor: pointer; transition: 0.3s; }
        .tz-pill.active { background: white; color: var(--sailor-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tz-pill.kr.active { color: var(--sailor-pink); }
        
        .map-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 25px; }
        .del-btn-round { position: absolute; top: -10px; right: -10px; background: #FF6B6B; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2.5px solid white; z-index: 10; font-weight: bold; cursor: pointer; }
        .cny-hint { font-size: 11px; color: var(--sailor-purple); margin-top: -8px; margin-bottom: 12px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="v-home">
        <div class="sm-logo-wrap">
            <h1 class="sm-title" onclick="pop(); location.reload()">Seoul Moon</h1>
            <img src="https://img.icons8.com/emoji/96/crescent-moon-emoji.png" style="position:absolute; width:45px; right:12%; top:5px; z-index:1; transform:rotate(15deg);">
        </div>
        <div class="dash-board">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span id="live-date" style="font-family:'Dancing Script'; font-size:28px; color:var(--deep-pink)">--.--</span>
                <span id="live-rate" style="background:var(--sailor-pink); color:white; padding:5px 15px; border-radius:20px; font-size:11px; font-weight:900;">获取汇率中...</span>
            </div>
            <div class="weather-scroll" id="w-axis">正在召唤魔法天气...</div>
        </div>
        <div id="flight-list" class="flight-container"></div>
        <div class="nav-stack">
            <div class="nav-btn nav-pink-bar" onclick="nav('plan')">🗓️ 行程计划 PLAN</div>
            <div class="nav-row-half">
                <div class="nav-btn nav-white-btn" onclick="nav('fin')">💰 记账本</div>
                <div class="nav-btn nav-white-btn" onclick="nav('wish')">🛍️ 购物清单</div>
            </div>
            <div class="nav-btn nav-white-btn" style="border-color:var(--sailor-purple)!important; color:var(--sailor-purple)!important;" onclick="nav('ticket')">🎓 票夹 TICKET BOX</div>
        </div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:30px; opacity:0.5;">
            <button class="nav-btn nav-white-btn" style="padding:10px 18px; font-size:10px; border-radius:12px;" onclick="exportData()">📦 备份</button>
            <button class="nav-btn nav-white-btn" style="padding:10px 18px; font-size:10px; border-radius:12px;" onclick="importData()">🔄 恢复数据</button>
        </div>
    </div>

    <div id="v-sub" class="hidden" style="position:fixed; inset:0; background:white; z-index:1000; padding:15px; overflow-y:auto; padding-top:env(safe-area-inset-top);">
        <div style="color:var(--sailor-pink); font-weight:900; margin-bottom:20px; font-size:18px; cursor:pointer;" onclick="nav('home')">← BACK</div>
        <div id="sub-header"></div>
        <div id="ledger-extra" class="hidden" style="margin-bottom:25px;">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
                <div class="nav-btn nav-white-btn" style="padding:15px 5px; border-radius:18px; flex-direction:column;" onclick="modifyWallet('Toss')">
                    <small style="margin-bottom:5px;">Toss</small><div id="val-Toss" style="font-size:12px;font-weight:900;">₩0</div>
                </div>
                <div class="nav-btn nav-white-btn" style="padding:15px 5px; border-radius:18px; flex-direction:column;" onclick="modifyWallet('Namane')">
                    <small style="margin-bottom:5px;">Namane</small><div id="val-Namane" style="font-size:12px;font-weight:900;">₩0</div>
                </div>
                <div class="nav-btn nav-white-btn" style="padding:15px 5px; border-radius:18px; flex-direction:column;" onclick="modifyWallet('TripPass')">
                    <small style="margin-bottom:5px;">TripPass</small><div id="val-TripPass" style="font-size:12px;font-weight:900;">₩0</div>
                </div>
            </div>
        </div>
        <div id="list-container"></div>
        <button class="nav-btn nav-pink-bar" style="position:fixed; bottom:25px; left:15px; width:calc(100% - 30px); border:none; padding:20px; border-radius:40px; font-weight:900; z-index:1001; box-shadow: 0 10px 25px var(--glow);" onclick="openEdit(curView, -1)">＋ 新增记录 ✨</button>
    </div>

    <div id="map-overlay" class="map-overlay" onclick="this.style.display='none'">
        <div style="background:white; width:90%; max-width:400px; border-radius:35px; padding:30px; max-height:80vh; overflow-y:auto;" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><b style="color:var(--naver-green); font-size:20px;">🗺️ 今日足迹汇总</b><span style="font-size:24px;" onclick="document.getElementById('map-overlay').style.display='none'">×</span></div>
            <div id="map-quick-list" style="display:flex; flex-direction:column; gap:12px;"></div>
        </div>
    </div>

    <div id="drawer" class="drawer" onclick="closeDrawer()">
        <div class="drawer-content" onclick="event.stopPropagation()">
            <div id="upload-zone" class="pre-box" onclick="pop(); document.getElementById('file-in').click()">
                <div class="scan-line"></div>
                <div id="preview-text" style="text-align:center;">📸<br><small>智能识图</small></div>
                <input type="file" id="file-in" class="hidden" accept="image/*" onchange="handleSmartOCR(this)">
            </div>
            <div id="d-form"></div>
            <div id="sync-area" style="margin-top:10px;"></div> 
            <button id="master-save-btn" class="nav-btn nav-pink-bar" style="width:100%; border:none; padding:20px; border-radius:40px; font-weight:900; margin-top:20px;" onclick="masterSave()">确认并保存 ✨</button>
        </div>
    </div>

<script>
    const DB_NAME = 'SeoulMoonFinal_V30', STORE_NAME = 'appData', DATA_KEY = 'core_data';
    let wallet, flights, store, curView = 'home', curIdx = -1, curDate = '04.29', RATE = 191.0, tempImg = '', dTz='上海', aTz='首尔', sTz='首尔', curCat='全部';
    
    // 安全震动防御，绝不报错
    const pop = () => { try { if(window.navigator && window.navigator.vibrate) window.navigator.vibrate(15); } catch(e){} }

    const dbPromise = new Promise((resolve) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = (e) => { e.target.result.createObjectStore(STORE_NAME); };
        req.onsuccess = () => resolve(req.result);
    });

    async function bootApp() {
        const db = await dbPromise;
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get(DATA_KEY);
        req.onsuccess = () => {
            const d = req.result;
            if (d) { wallet = d.wallet; flights = d.flights; store = d.store; }
            else { 
                wallet = { Toss: 0, Namane: 0, TripPass: 0 }; 
                flights = [{ air: "韩亚航空", no: "OZ3625", date: "2026-04-29", t1: "10:55", t2: "14:00", tz1: "上海", tz2: "首尔", s1: "12A", c1: "A19", g1: "T2" }]; 
                store = { plan: [], ticket: [], wish: [], fin: [] }; 
            }
            initUI();
        };
    }

    async function localCommit() {
        const db = await dbPromise;
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put({wallet, flights, store}, DATA_KEY);
    }

    function initUI() { 
        const n = new Date(); document.getElementById('live-date').innerText = `${n.getMonth()+1}.${n.getDate()}`;
        updateWeather(); updateExchangeRate(); renderFlights(); 
    }

    function renderFlights() {
        const list = document.getElementById('flight-list'); if(!list) return;
        const today = new Date(); today.setHours(0,0,0,0);
        list.innerHTML = flights.map((f, i) => {
            const diff = Math.ceil((new Date(f.date.replace(/-/g, '/')) - today) / 86400000);
            return `<div class="f-card" onclick="openEdit('flight', ${i})">
                <div class="del-btn-round" onclick="delItem(event, 'flight', ${i})">×</div>
                <div class="d-day-badge">D-${diff>=0?diff:0}</div>
                <div style="font-weight:900;color:var(--sailor-blue);font-size:18px;margin-bottom:12px;">✈️ ${f.air||'--'} ${f.no||''}</div>
                <div style="display:flex;justify-content:space-between;margin:15px 0;font-size:32px;font-weight:900;">
                    <div>${f.t1||'--:--'}<small style="font-size:11px;display:block;opacity:0.5;font-weight:400;">${f.tz1||'上海'}</small></div>
                    <div style="opacity:0.1; font-size:24px; padding-top:10px;">✈️</div>
                    <div>${f.t2||'--:--'}<small style="font-size:11px;display:block;opacity:0.5;font-weight:400;">${f.tz2||'首尔'}</small></div>
                </div>
                <div class="tag-row"><div class="tag">柜台: ${f.c1||'--'}</div><div class="tag">登机口: ${f.g1||'--'}</div><div class="tag">座位: ${f.s1||'--'}</div></div>
            </div>`;
        }).join('') + `<div class="f-card add-btn" onclick="openEdit('flight', -1)"><div style="font-size:32px;margin-bottom:10px;">+</div>新增航班卡片</div>`;
    }

    function showDailyMap() {
        pop(); const items = store.plan.filter(it => it.date === curDate && it.link); 
        const quickList = document.getElementById('map-quick-list');
        if(items.length === 0) quickList.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">今日未录入 Naver 链接</div>';
        else quickList.innerHTML = items.map(it => `<div class="nav-btn nav-white-btn" style="justify-content:space-between;padding:18px;border-radius:25px;" onclick="window.open('${it.link}')"><div><b style="font-size:15px;">${it.name}</b><br><small style="color:#999;">${it.time}</small></div><div style="background:var(--naver-green);color:white;padding:6px 15px;border-radius:12px;font-size:11px;">Map</div></div>`).join('');
        document.getElementById('map-overlay').style.display = 'flex';
    }

    function renderList() {
        const box = document.getElementById('list-container'), header = document.getElementById('sub-header');
        if(!box) return; box.innerHTML = ''; header.innerHTML = '';
        const days = ['04.29','04.30','05.01','05.02','05.03'];
        
        if(curView === 'plan') {
            header.innerHTML = `<div class="nav-btn nav-white-btn" style="padding:12px; margin-bottom:15px; background:var(--naver-green)!important; color:white!important; border:none; box-shadow:0 4px 15px rgba(3,199,90,0.3);" onclick="showDailyMap()">🗺️ 开启今日地图汇总</div><div class="date-bar">` + days.map(d => `<div class="date-item ${curDate===d?'active':''}" onclick="pop(); curDate='${d}';renderList();">${d}</div>`).join('') + '</div>';
            const planItems = store.plan.filter(it => it.date === curDate).sort((a,b) => (a.time||'00:00').localeCompare(b.time||'00:00'));
            box.innerHTML = `<div class="timeline-box"><div class="timeline-line" style="left:42px;"></div>` + planItems.map(it => `<div class="list-item-long" onclick="openEdit('plan', ${store.plan.indexOf(it)})"><div class="del-btn-round" onclick="delItem(event, 'plan', ${store.plan.indexOf(it)})">×</div><div class="node-circle">${it.img?`<img src="${it.img}" style="width:100%;height:100%;object-fit:cover">`:'📍'}</div><div style="flex:1"><div style="font-weight:900;color:var(--sailor-pink);">${it.time||'--:--'}<span class="tz-badge ${it.tz==='上海'?'tz-cn':'tz-kr'}">${it.tz||'首尔'}</span></div><b style="color:var(--brown); font-size:18px;">${it.name}</b></div>${it.link?`<div style="background:var(--naver-green);color:white;padding:6px 12px;border-radius:12px;font-size:11px;font-weight:900;" onclick="event.stopPropagation(); window.open('${it.link}')">Map</div>`:''}</div>`).join('') + `</div>`;
        } else if(curView === 'fin') {
            header.innerHTML = '<div class="date-bar">' + days.map(d => `<div class="date-item ${curDate===d?'active':''}" onclick="pop(); curDate='${d}';renderList();">${d}</div>`).join('') + '</div>';
            const finItems = store.fin.filter(it => it.date === curDate);
            if(finItems.length > 0) { const total = finItems.reduce((s, i) => s + Number(i.price||0), 0); box.innerHTML += `<div class="dash-board" style="background:linear-gradient(90deg, var(--sailor-pink), var(--deep-pink)); color:white; padding:22px; border-radius:25px; margin-bottom:20px;"><div>今日总支出</div><div style="font-size:28px; font-weight:900;">₩${total.toLocaleString()}</div><small style="opacity:0.8;">≈ ¥${(total/RATE).toFixed(1)}</small></div>`; }
            finItems.forEach(it => { box.innerHTML += `<div class="list-item-long" onclick="openEdit('fin', ${store.fin.indexOf(it)})"><div class="del-btn-round" onclick="delItem(event, 'fin', ${store.fin.indexOf(it)})">×</div><div class="node-circle" style="border:none;width:50px;height:50px;">${it.img?`<img src="${it.img}" style="width:100%;height:100%;object-fit:cover">`:'💰'}</div><div style="flex:1"><b>${it.name}</b><br><small style="color:#999">${it.cat||'其他'} · ${it.subPay||it.pay}</small></div><b style="color:var(--deep-pink); font-size:16px;">₩${Number(it.price).toLocaleString()}</b></div>`; });
        } else if(curView === 'wish') {
            header.innerHTML = `<div class="date-bar">` + ['全部','Olive Young','Musinsa','药局','其他'].map(c => `<div class="date-item ${curCat===c?'active':''}" onclick="pop(); curCat='${c}';renderList()">${c}</div>`).join('') + `</div>`;
            store.wish.forEach((it, idx) => { if(curCat==='全部' || it.cat===curCat) box.innerHTML += `<div class="list-item-long" onclick="openEdit('wish', ${idx})"><div class="del-btn-round" onclick="delItem(event, 'wish', ${idx})">×</div><div class="node-circle" style="border:none;width:50px;height:50px;">${it.img?`<img src="${it.img}" style="width:100%;height:100%;object-fit:cover">`:'🛍️'}</div><div style="flex:1"><b>${it.name}</b><br><small>${it.cat}</small></div><b style="color:var(--deep-pink); font-size:16px;">₩${Number(it.price).toLocaleString()}</b></div>`; });
        } else if(curView === 'ticket') {
            // 完美 3D 翻转与撕票口
            store.ticket.forEach((it, i) => { box.innerHTML += `<div class="ticket-scene" onclick="pop(); this.querySelector('.ticket-flip').classList.toggle('is-flipped');"><div class="ticket-flip"><div class="ticket-face"><div class="ticket-stub"><div class="ticket-hole hole-t"></div><div class="ticket-hole hole-b"></div><div class="ticket-cut"></div><div class="del-btn-round" onclick="delItem(event, 'ticket', ${i})">×</div><div class="node-circle" style="border:none;margin-right:15px;width:60px;height:60px;">${it.img?`<img src="${it.img}" style="width:100%;height:100%;object-fit:cover">`:'🎫'}</div><div style="flex:1;"><small style="color:var(--sailor-pink);font-weight:900;font-size:10px;">ENTRY TICKET</small><br><b style="font-size:18px;">${it.name}</b><br><small style="color:var(--brown);">📍 ${it.venue}</small></div><div style="width:85px;text-align:center;border-left:1.5px dashed #D1E1FF;padding-left:10px;display:flex;flex-direction:column;justify-content:center;"><b style="color:var(--sailor-purple);font-size:16px;">${it.area}</b><small style="font-weight:900;">${it.row}排${it.num}号</small></div></div></div><div class="ticket-face ticket-back ticket-stub"><div class="ticket-hole hole-t"></div><div class="ticket-hole hole-b"></div><div class="ticket-cut"></div><b style="font-size:24px;margin-bottom:15px;">${it.area} ${it.row}排</b><div style="display:flex;gap:10px;">${it.link?`<button class="nav-btn nav-white-btn" style="padding:10px 15px;font-size:12px;" onclick="event.stopPropagation(); window.open('${it.link}')">🔗 订单链接</button>`:''}<button class="nav-btn nav-pink-bar" style="padding:10px 20px;font-size:12px;" onclick="event.stopPropagation(); openEdit('ticket', ${i})">✎ 修改票务</button></div></div></div></div>`; });
        }
    }

    const lb = (t) => `<div class="f-label">${t}</div>`;
    function openEdit(v, idx) {
        pop(); curView = v; curIdx = idx; tempImg = ''; const f = document.getElementById('d-form'); const s = document.getElementById('sync-area'); s.innerHTML = ''; document.getElementById('drawer').classList.add('active');
        const it = idx > -1 ? (v==='flight'?flights[idx]:store[v][idx]) : {};
        document.getElementById('preview-text').innerHTML = it.img ? `<img src="${it.img}" style="width:100%;height:100%;object-fit:cover;border-radius:20px;">` : '📸<br><small>智能识图</small>';
        
        let html = "";
        if (v === 'flight') {
            dTz = it.tz1 || '上海'; aTz = it.tz2 || '首尔';
            html = `${lb('起降时区')}<div style="display:flex;gap:10px;"><div class="tz-pill-box"><div class="tz-pill ${dTz==='上海'?'active':''}" onclick="setTz('dep','上海',this)">起:上海</div><div class="tz-pill kr ${dTz==='首尔'?'active':''}" onclick="setTz('dep','首尔',this)">起:首尔</div></div><div class="tz-pill-box"><div class="tz-pill ${aTz==='上海'?'active':''}" onclick="setTz('arr','上海',this)">降:上海</div><div class="tz-pill kr ${aTz==='首尔'?'active':''}" onclick="setTz('arr','首尔',this)">降:首尔</div></div></div>${lb('详情')}<div style="display:flex;gap:8px;"><input id="f-air" class="f-input" placeholder="航司" value="${it.air||''}"> <input id="f-no" class="f-input" placeholder="号" value="${it.no||''}"></div>${lb('日期/时间')}<input id="f-date-fl" class="f-input" type="date" value="${it.date||'2026-04-29'}"><div style="display:flex;gap:8px;"><input id="f-t1" class="f-input" type="time" value="${it.t1||''}"> <input id="f-t2" class="f-input" type="time" value="${it.t2||''}"></div>${lb('座位信息')}<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"><input id="f-c1" class="f-input" placeholder="柜台" value="${it.c1||''}"> <input id="f-g1" class="f-input" placeholder="登机口" value="${it.g1||''}"> <input id="f-s1" class="f-input" placeholder="座位" value="${it.s1||''}"></div>`;
        } else if (v === 'plan') {
            sTz = it.tz || '首尔';
            html = `${lb('行程时区')}<div class="tz-pill-box" style="width:60%;"><div class="tz-pill ${sTz==='上海'?'active':''}" onclick="setTz('single','上海',this)">上海</div><div class="tz-pill kr ${sTz==='首尔'?'active':''}" onclick="setTz('single','首尔',this)">首尔</div></div><input id="f-name" class="f-input" placeholder="行程名" value="${it.name||''}"><input id="f-time" class="f-input" type="time" value="${it.time||'12:00'}"><input id="f-link" class="f-input" placeholder="Naver链接" value="${it.link||''}">`;
        } else if (v === 'fin') {
            html = `${lb('分类')}<div class="selector-group" id="f-cat-sel"><div class="selector-item ${it.cat==='餐饮'?'active':''}" onclick="selectBtn(this)">餐饮</div><div class="selector-item ${it.cat==='购物'?'active':''}" onclick="selectBtn(this)">购物</div><div class="selector-item ${it.cat==='交通'?'active':''}" onclick="selectBtn(this)">交通</div><div class="selector-item ${it.cat==='娱乐'?'active':''}" onclick="selectBtn(this)">娱乐</div><div class="selector-item ${(!it.cat||it.cat==='其他')?'active':''}" onclick="selectBtn(this)">其他</div></div>${lb('方式')}<div class="selector-group" id="p-sel"><div class="selector-item ${(!it.pay||it.pay==='韩币')?'active':''}" onclick="selectPay(this)">韩币</div><div class="selector-item ${it.pay==='微信'?'active':''}" onclick="selectPay(this)">微信</div><div class="selector-item ${it.pay==='信用卡'?'active':''}" onclick="selectPay(this)">信用卡</div><div class="selector-item ${it.pay==='现金'?'active':''}" onclick="selectPay(this)">现金</div></div><div id="sub-pay-area" class="${(!it.pay||it.pay==='韩币')?'':'hidden'}"><div class="selector-group" id="w-sel"><div class="selector-item ${it.subPay==='Toss'?'active':''}" onclick="selectBtn(this)">Toss</div><div class="selector-item ${it.subPay==='Namane'?'active':''}" onclick="selectBtn(this)">Namane</div><div class="selector-item ${it.subPay==='TripPass'?'active':''}" onclick="selectBtn(this)">TripPass</div></div></div><input id="f-name" class="f-input" placeholder="项目" value="${it.name||''}"><input id="f-price" class="f-input" type="number" placeholder="₩" value="${it.price||''}" oninput="updateCnyHint(this.value)"><div id="c-hint" class="cny-hint">≈ ¥${it.price?(it.price/RATE).toFixed(1):'0.0'}</div>`;
        } else if (v === 'wish') {
            html = `<input id="f-name" class="f-input" placeholder="名称" value="${it.name||''}"><input id="f-price" class="f-input" type="number" placeholder="₩" value="${it.price||''}" oninput="updateCnyHint(this.value)"><div id="c-hint" class="cny-hint">≈ ¥${it.price?(it.price/RATE).toFixed(1):'0.0'}</div>${lb('分类')}<div class="selector-group" id="c-sel"><div class="selector-item ${it.cat==='Olive Young'?'active':''}" onclick="selectBtn(this)">Olive Young</div><div class="selector-item ${it.cat==='Musinsa'?'active':''}" onclick="selectBtn(this)">Musinsa</div><div class="selector-item ${it.cat==='药局'?'active':''}" onclick="selectBtn(this)">药局</div><div class="selector-item ${(!it.cat||it.cat==='其他')?'active':''}" onclick="selectBtn(this)">其他</div></div>`;
            if(idx > -1) s.innerHTML = `<button class="nav-btn nav-white-btn" style="width:100%; border:2px solid var(--deep-pink); color:var(--deep-pink); font-size:12px;" onclick="syncToFin(${idx})">💸 同步至记账本</button>`;
        } else if (v === 'ticket') {
            html = `<input id="f-name" class="f-input" placeholder="活动" value="${it.name||''}"><div style="display:flex;gap:5px;"><input id="f-area" class="f-input" placeholder="区" value="${it.area||''}"> <input id="f-row" class="f-input" placeholder="排" value="${it.row||''}"> <input id="f-num" class="f-input" placeholder="号" value="${it.num||''}"></div><input id="f-venue" class="f-input" placeholder="场馆" value="${it.venue||''}"><input id="f-link" class="f-input" placeholder="详情链接" value="${it.link||''}">`;
        }
        f.innerHTML = html;
    }

    function masterSave() {
        pop(); const d = document, getV = (id) => d.getElementById(id)?.value || '';
        const obj = { name:getV('f-name'), time:getV('f-time'), t1:getV('f-t1'), t2:getV('f-t2'), air:getV('f-air'), no:getV('f-no'), c1:getV('f-c1'), g1:getV('f-g1'), s1:getV('f-s1'), link:getV('f-link'), area:getV('f-area'), row:getV('f-row'), num:getV('f-num'), venue:getV('f-venue'), price:getV('f-price'), tz:sTz, tz1:dTz, tz2:aTz, date:getV('f-date-fl')||curDate, img:tempImg || (curIdx>-1? (curView==='flight'?flights[curIdx].img:store[curView][curIdx].img) :'') };
        if(curView==='flight') { if(curIdx>-1) flights[curIdx]=obj; else flights.push(obj); }
        else if(curView==='plan') { if(curIdx>-1) store.plan[curIdx]=obj; else store.plan.push(obj); }
        else if(curView==='fin') { obj.pay = d.querySelector('#p-sel .active')?.innerText; obj.subPay = (obj.pay==='韩币')?d.querySelector('#w-sel .active')?.innerText:''; obj.cat = d.querySelector('#f-cat-sel .active')?.innerText; if(curIdx>-1 && store.fin[curIdx].subPay) wallet[store.fin[curIdx].subPay] += Number(store.fin[curIdx].price); if(obj.subPay) wallet[obj.subPay] -= Number(obj.price); if(curIdx>-1) store.fin[curIdx]=obj; else store.fin.push(obj); }
        else if(curView==='wish') { obj.cat = d.querySelector('#c-sel .active')?.innerText; if(curIdx>-1) store.wish[curIdx]=obj; else store.wish.push(obj); }
        else if(curView==='ticket') { if(curIdx>-1) store.ticket[curIdx]=obj; else store.ticket.push(obj); }
        localCommit(); closeDrawer(); if(curView==='home') { renderFlights(); initUI(); } else { renderList(); updateWalletUI(); }
    }

    function nav(v) { pop(); curView = v; document.getElementById('v-home').className = (v==='home'?'':'hidden'); document.getElementById('v-sub').className = (v==='home'?'hidden':''); document.getElementById('ledger-extra').className = (v==='fin'?'':'hidden'); if(v!=='home') renderList(); else initUI(); updateWalletUI(); }
    function closeDrawer() { document.getElementById('drawer').classList.remove('active'); }
    function setTz(t, v, el) { pop(); if(t==='single') sTz = v; else if(t==='dep') dTz = v; else if(t==='arr') aTz = v; el.parentNode.querySelectorAll('.tz-pill').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function selectBtn(el) { pop(); el.parentNode.querySelectorAll('.selector-item').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function selectPay(el) { selectBtn(el); document.getElementById('sub-pay-area').className = (el.innerText === '韩币' ? '' : 'hidden'); }
    function updateCnyHint(v) { const el = document.getElementById('c-hint'); if(el) el.innerText = '≈ ¥' + (Number(v)/RATE).toFixed(1); }
    async function updateWeather() { try { const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul`); const d = await r.json(); document.getElementById('w-axis').innerHTML = d.daily.time.map((date, idx) => `<div class="w-item"><small>${date.slice(5)}</small><br><span style="font-size:22px;">${d.daily.weathercode[idx]>50?'🌧️':'⛅'}</span><br><b style="font-size:10px;color:var(--deep-pink);">${Math.round(d.daily.temperature_2m_min[idx])}/${Math.round(d.daily.temperature_2m_max[idx])}°</b></div>`).join(''); } catch(e){} }
    async function updateExchangeRate() { try { const r = await fetch('https://open.er-api.com/v6/latest/CNY'); const d = await r.json(); RATE = d.rates.KRW; document.getElementById('live-rate').innerText = `1 CNY ≈ ${RATE.toFixed(1)} ₩`; } catch(e){} }
    function modifyWallet(t) { pop(); const v = prompt(`修改 ${t} 余额:`, wallet[t]); if(v!==null && !isNaN(Number(v))){ wallet[t]=Number(v); updateWalletUI(); localCommit(); } }
    function updateWalletUI() { if(document.getElementById('val-Toss')) { document.getElementById('val-Toss').innerText='₩'+wallet.Toss.toLocaleString(); document.getElementById('val-Namane').innerText='₩'+wallet.Namane.toLocaleString(); document.getElementById('val-TripPass').innerText='₩'+wallet.TripPass.toLocaleString(); } }
    function delItem(e, t, i) { e.stopPropagation(); pop(); if(confirm('删除吗?')){ if(t==='flight') flights.splice(i,1); else store[t].splice(i,1); localCommit(); if(curView==='home') renderFlights(); else renderList(); } }
    function syncToFin(i) { pop(); const it = store.wish[i]; store.fin.unshift({ name: it.name, date: curDate, price: it.price, pay: '信用卡', subPay: '', cat: '购物', img: it.img }); localCommit(); closeDrawer(); nav('fin'); }
    function exportData() { prompt("码:", btoa(encodeURIComponent(JSON.stringify({wallet, flights, store})))); }
    function importData() { const c = prompt("码:"); if(c) { try { const d = JSON.parse(decodeURIComponent(atob(c))); wallet=d.wallet; flights=d.flights; store=d.store; localCommit(); initUI(); } catch(e){alert("解析失败");} } }
    async function handleSmartOCR(input) { pop(); const r = new FileReader(); document.getElementById('upload-zone').classList.add('scanning'); r.onload = (e) => { const img = new Image(); img.onload = async () => { const canvas = document.createElement('canvas'); let w = img.width, h = img.height, max = 800; if(w > h) { if(w > max){ h *= max/w; w = max; } } else { if(h > max){ w *= max/h; h = max; } } canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h); tempImg = canvas.toDataURL('image/jpeg', 0.7); document.getElementById('preview-text').innerHTML = `<img src="${tempImg}" style="width:100%;height:100%;object-fit:cover;border-radius:20px;">`; try { const result = await Tesseract.recognize(tempImg, 'eng+kor'); const text = result.data.text; const pr = (text.match(/[0-9]{1,3}(?:,[0-9]{3})+/g) || [text.match(/\d{4,}/g)])[0]?.toString().replace(/,/g,'') || ""; const name = text.split('\n').map(l => l.trim()).filter(l => l.length > 4 && (l.match(/[a-zA-Z가-힣]/g) || []).length >= 4).sort((a, b) => b.length - a.length)[0]; document.getElementById('upload-zone').classList.remove('scanning'); if (document.getElementById('f-name')) document.getElementById('f-name').value = name || ""; if (document.getElementById('f-price')) { document.getElementById('f-price').value = pr; updateCnyHint(pr); } } catch (err) { document.getElementById('upload-zone').classList.remove('scanning'); } }; img.src = e.target.result; }; r.readAsDataURL(input.files[0]); }
    bootApp();
</script>
</body>
</html>
