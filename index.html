<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Seoul Moon🌙 Final Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --sailor-pink: #FF99CC; --sailor-purple: #B19CD9; --sailor-blue: #5D9CEC; --sailor-gold: #FFD700; --deep-pink: #FF6699; --glow: rgba(255, 182, 193, 0.4); --naver-green: #03C75A; --brown: #4D3B3B; --light-purple: #E6E0F8; --high-school-blue: #3A8DFF; }
        * { box-sizing: border-box; font-family: 'PingFang SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #FFF5F9 0%, #F0F4FF 100%); margin: 0; padding: env(safe-area-inset-top) 15px 80px 15px; min-height: 100vh; overflow-x: hidden; }
        .hidden { display: none !important; }
        .sm-title { font-family: 'Dancing Script', cursive; font-size: 42px; color: var(--deep-pink); text-align: center; margin: 15px 0; text-shadow: 2px 2px 0 white; position: relative; cursor: pointer; }
        .dash-board { background: rgba(255, 255, 255, 0.7); border: 2px solid white; border-radius: 30px; padding: 18px; box-shadow: 0 8px 25px var(--glow); backdrop-filter: blur(10px); margin-bottom: 20px; }
        .weather-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; }
        .w-item { min-width: 75px; text-align: center; background: white; padding: 12px 5px; border-radius: 20px; border: 1.5px solid #FFE4E1; flex-shrink: 0; }
        .w-item b { font-size: 11px; display: block; margin-top: 4px; color: var(--deep-pink); }
        .flight-container { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px 20px; scrollbar-width: none; scroll-snap-type: x mandatory; min-height: 120px; }
        .flight-card { flex: 0 0 88%; background: white; border: 3px solid var(--sailor-blue); border-radius: 25px; padding: 20px; box-shadow: 8px 8px 0px var(--sailor-blue); position: relative; scroll-snap-align: center; }
        .add-flight-card { flex: 0 0 88%; border: 2px dashed var(--sailor-blue); border-radius: 25px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.4); cursor: pointer; scroll-snap-align: center; }
        .d-day-badge { position: absolute; top: 15px; right: 15px; background: var(--sailor-gold); color: var(--brown); padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 900; box-shadow: 2px 2px 0 var(--brown); }
        .tag-row { display: flex; gap: 6px; margin-top: 15px; border-top: 1px dashed #DDD; padding-top: 15px; }
        .tag { flex: 1; padding: 6px 4px; border-radius: 8px; font-size: 10px; font-weight: 900; text-align: center; }
        .nav-stack { display: flex; flex-direction: column; gap: 15px; }
        .nav-row-half { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .nav-btn { border-radius: 22px; padding: 22px; text-align: center; box-shadow: 0 6px 15px var(--glow); cursor: pointer; transition: 0.2s; }
        .nav-btn h2 { margin: 0; font-size: 18px; font-weight: 900; }
        .nav-pink { background: linear-gradient(135deg, var(--sailor-pink), var(--deep-pink)); color: white; }
        .nav-white { background: white; border: 2.5px solid #FFE4E1; color: var(--brown); }
        .ticket-stub { background: white; border: 2px solid var(--high-school-blue); border-radius: 15px; display: flex; overflow: hidden; margin-bottom: 15px; position: relative; cursor: pointer; }
        .ticket-main { flex: 1; padding: 15px; border-right: 2.5px dashed var(--high-school-blue); display: flex; align-items: center; gap: 12px; }
        .ticket-side { width: 100px; background: #f0f7ff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .item-card { background: white; border: 2px solid #FFF0F5; border-radius: 22px; padding: 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; position: relative; }
        .card-pic { width: 60px; height: 60px; background: #F8F9FA; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; font-size: 24px; }
        .card-pic img { width: 100%; height: 100%; object-fit: cover; }
        .drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; align-items: flex-end; z-index: 5000; }
        .drawer.active { display: flex; }
        .drawer-content { background: white; width: 100%; padding: 25px; border-radius: 35px 35px 0 0; max-height: 92vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom); }
        .f-label { font-size: 13px; font-weight: 900; color: var(--brown); margin: 12px 0 6px; display: block; }
        .f-input { width: 100%; padding: 14px; background: #F8F9FA; border: 1.5px solid #EEE; border-radius: 15px; outline: none; font-size: 14px; }
        .selector-group { display: flex; gap: 8px; margin-bottom: 10px; width: 100%; }
        .selector-item { flex: 1; padding: 12px 0; border: 1.5px solid #EEE; border-radius: 15px; text-align: center; font-size: 11px; cursor: pointer; font-weight: 900; background: white; }
        .selector-item.active { background: var(--brown); color: white; border-color: var(--brown); }
        .btn-main { background: linear-gradient(90deg, var(--sailor-pink), var(--deep-pink)); color: white; width: 100%; padding: 18px; border-radius: 40px; border: none; font-weight: 900; font-size: 16px; margin-top: 15px; cursor: pointer; }
        .naver-btn { background: var(--naver-green); color: white; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 900; cursor: pointer; }
        .cny-hint { font-size: 11px; color: var(--sailor-purple); margin-top: 6px; font-weight: 900; }
        .del-btn { position: absolute; top: -8px; right: -8px; background: var(--deep-pink); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 10; border: 2px solid white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="v-home">
        <h1 class="sm-title" onclick="init()">Seoul Moon🌙</h1>
        <div class="dash-board">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span id="live-date" style="font-family:'Dancing Script'; font-size:28px; color:var(--deep-pink)">Seoul --.--</span>
                <span id="live-rate" style="background:var(--sailor-pink); color:white; padding:5px 15px; border-radius:20px; font-size:11px; font-weight:900;">获取汇率中...</span>
            </div>
            <div class="weather-scroll" id="w-axis">正在获取魔法天气...</div>
        </div>
        <div id="flight-list" class="flight-container"></div>
        <div class="nav-stack">
            <div class="nav-btn nav-pink" onclick="nav('plan')"><h2>🗓️ 行程计划 PLAN</h2></div>
            <div class="nav-row-half">
                <div class="nav-btn nav-white" onclick="nav('fin')"><h2>💰 记账本</h2></div>
                <div class="nav-btn nav-white" onclick="nav('wish')"><h2>🛍️ 购物清单</h2></div>
            </div>
            <div class="nav-btn nav-white" style="border:2px solid var(--sailor-purple); color:var(--sailor-purple);" onclick="nav('ticket')"><h2>🎓 票夹 TICKET BOX</h2></div>
        </div>
    </div>

    <div id="v-sub" class="hidden" style="padding:15px; position:fixed; inset:0; background:white; z-index:1000; overflow-y:auto; padding-top:env(safe-area-inset-top);">
        <div style="color:var(--sailor-pink); font-weight:900; margin-bottom:20px; cursor:pointer;" onclick="nav('home')">← BACK</div>
        <div id="sub-header"></div>
        <div id="ledger-extra" class="hidden">
            <div class="nav-row-half" style="margin-bottom:15px; grid-template-columns: 1fr 1fr 1fr;">
                <div class="nav-btn nav-white" style="padding:10px;" onclick="modifyWallet('Toss')"><small>Toss</small><div id="val-Toss" style="font-size:10px;font-weight:900;">₩0</div></div>
                <div class="nav-btn nav-white" style="padding:10px;" onclick="modifyWallet('Namane')"><small>Namane</small><div id="val-Namane" style="font-size:10px;font-weight:900;">₩0</div></div>
                <div class="nav-btn nav-white" style="padding:10px;" onclick="modifyWallet('TripPass')"><small>TripPass</small><div id="val-TripPass" style="font-size:10px;font-weight:900;">₩0</div></div>
            </div>
        </div>
        <div id="list-container" style="padding-bottom:100px;"></div>
        <button class="btn-main" style="position:fixed; bottom:20px; left:15px; width:calc(100% - 30px);" onclick="openEdit(curView, -1)">＋ 新增记录 ✨</button>
    </div>

    <div id="drawer" class="drawer" onclick="closeDrawer()">
        <div class="drawer-content" onclick="event.stopPropagation()">
            <h2 id="d-title" style="margin:0; font-size:18px; color:var(--brown); margin-bottom:15px;">魔法编辑</h2>
            <div style="border:2.5px dashed var(--sailor-purple); padding:15px; border-radius:20px; text-align:center; background:#F8F4FF; margin-bottom:15px; cursor:pointer;" onclick="document.getElementById('file-in').click()">
                <div id="preview-text">📸 点击上传/识图回填</div>
                <input type="file" id="file-in" class="hidden" accept="image/*" onchange="handleFileWithCompression(this)">
            </div>
            <div id="d-form"></div>
            <div id="sync-area"></div>
            <button class="btn-main" onclick="masterSave()">确认并保存 ✨</button>
        </div>
    </div>

<script>
    const KEY = 'SeoulMoon_Final_Lock';
    // 自动找回之前确定的数据
    const saved = JSON.parse(localStorage.getItem(KEY)) || JSON.parse(localStorage.getItem('SeoulMoon_Data_Final_v2')) || JSON.parse(localStorage.getItem('SeoulMoon_Data_Final')) || {};

    let curView = 'home', curIdx = -1, curDate = '04.29', RATE = 191.0, tempImg = '';
    let wallet = saved.wallet || { Toss: 100000, Namane: 50000, TripPass: 30000 };
    let flights = saved.flights || [{ air: "韩亚航空", no: "OZ3635", date: "2026-04-29", t1: "11:10", t2: "14:00", from: "PVG", to: "GMP", c1: "K区", g1: "T2-G", s1: "12A" }];
    let store = saved.store || { 
        plan: [
            { date: '04.29', time: "16:00", name: "预约做指甲", note: "네일하리", link: "https://naver.me/xs3KmFEH" },
            { date: '05.02', time: "12:00", name: "午餐 몽탄", note: "Day 4", link: "https://naver.me/GALRPbOp" }
        ], 
        ticket: [{ name: "REPLY HIGH SCHOOL FM", date: "05.01", venue: "Olympic Hall", area: "B", row: "12", num: "18", img: "" }], 
        wish: [], fin: [] 
    };

    function localCommit() { localStorage.setItem(KEY, JSON.stringify({ wallet, flights, store })); }

    function init() { 
        const now = new Date();
        document.getElementById('live-date').innerText = `Seoul ${now.getMonth()+1}.${now.getDate()}`;
        updateWeather(); updateExchangeRate(); renderFlights(); updateWalletUI(); 
    }

    function updateWalletUI() { 
        document.getElementById('val-Toss').innerText='₩'+wallet.Toss.toLocaleString(); 
        document.getElementById('val-Namane').innerText='₩'+wallet.Namane.toLocaleString(); 
        document.getElementById('val-TripPass').innerText='₩'+wallet.TripPass.toLocaleString(); 
    }

    function modifyWallet(type) { const v = prompt(`修改 ${type} 余额:`, wallet[type]); if(v!==null){ wallet[type]=Number(v); updateWalletUI(); localCommit(); } }

    async function updateWeather() { try { const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Asia%2FSeoul`); const data = await res.json(); document.getElementById('w-axis').innerHTML = data.daily.time.slice(0, 7).map((date, idx) => `<div class="w-item"><small>${date.split('-').slice(1).join('.')}</small><div style="font-size:22px;margin:4px 0;">${data.daily.weathercode[idx]>50?'🌧️':'⛅'}</div><b>${Math.round(data.daily.temperature_2m_min[idx])}°/${Math.round(data.daily.temperature_2m_max[idx])}°</b></div>`).join(''); } catch(e){} }
    async function updateExchangeRate() { try { const res = await fetch('https://open.er-api.com/v6/latest/CNY'); const data = await res.json(); RATE = data.rates.KRW; document.getElementById('live-rate').innerText = `¥1 ≈ ₩${RATE.toFixed(1)}`; } catch(e){} }

    function renderFlights() {
        const box = document.getElementById('flight-list');
        const today = new Date(); today.setHours(0,0,0,0);
        let html = flights.map((f, i) => {
            const target = new Date(f.date.replace(/-/g, '/'));
            const diff = Math.ceil((target - today) / 86400000);
            return `<div class="flight-card" onclick="openEdit('flight', ${i})"><div class="del-btn" onclick="delItem(event, 'flight', ${i})">×</div><div class="d-day-badge">${diff >= 0 ? 'D-' + diff : 'Trip!'}</div><div style="font-weight:900;color:var(--sailor-blue)">${f.air} ${f.no}</div><div style="display:flex;justify-content:space-between;margin-top:10px;"><b>${f.t1||'--'}</b>✈️<b>${f.t2||'--'}</b></div><div class="tag-row"><div class="tag" style="background:#F5F5F5">柜台 ${f.c1||'-'}</div><div class="tag" style="background:#E6F3FF">登机口 ${f.g1||'-'}</div><div class="tag" style="background:#FFF0F6">座位 ${f.s1||'-'}</div></div></div>`;
        }).join('');
        html += `<div class="add-flight-card" onclick="openEdit('flight', -1)"><div style="text-align:center; color:var(--sailor-blue); font-weight:900;"><div style="font-size:24px;">✈️</div><div>添加航班</div></div></div>`;
        box.innerHTML = html;
    }

    function nav(v) { curView = v; document.getElementById('v-home').className = (v==='home'?'':'hidden'); document.getElementById('v-sub').className = (v==='home'?'hidden':''); document.getElementById('ledger-extra').className = (v==='fin'?'':'hidden'); renderList(); updateWalletUI(); }

    function renderList() {
        const box = document.getElementById('list-container'); const header = document.getElementById('sub-header'); if(!box) return; box.innerHTML = ''; header.innerHTML = '';
        if(curView === 'plan' || curView === 'fin') {
            const baseDates = ['04.29','04.30','05.01','05.02','05.03','05.04'];
            // 核心修复：自动增加记录里出现的日期标签
            const recordDates = store[curView].map(it => it.date);
            const allDates = [...new Set([...baseDates, ...recordDates])].sort();
            
            header.innerHTML = '<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:15px;">' + allDates.map(d => `<div onclick="curDate='${d}';renderList();" style="padding:10px 18px;background:${curDate===d?'var(--sailor-pink)':'#f0f0f0'};color:${curDate===d?'white':'#666'};border-radius:15px;font-size:12px;font-weight:900;flex-shrink:0;">${d}</div>`).join('') + '</div>';
            
            store[curView].filter(it => it.date === curDate).forEach((it) => {
                const realIdx = store[curView].indexOf(it);
                let mapBtn = it.link ? `<div class="naver-btn" onclick="event.stopPropagation(); window.location.href='${it.link}'">Map</div>` : '';
                box.innerHTML += `<div class="item-card" onclick="openEdit('${curView}', ${realIdx})"><div class="del-btn" onclick="delItem(event, '${curView}', ${realIdx})">×</div><div class="card-pic">${it.img?`<img src="${it.img}">`:(curView==='plan'?'📍':'💰')}</div><div style="flex:1"><b>${it.name}</b><br><small style="color:#999">${it.time||''} ${it.note||it.subPay||it.pay||''}</small></div>${mapBtn}${it.price?`<b style="color:var(--deep-pink)">₩${Number(it.price).toLocaleString()}</b>`:''}</div>`;
            });
        } else {
            store[curView].forEach((it, i) => {
                box.innerHTML += (curView === 'ticket') ? `<div class="ticket-stub" onclick="openEdit('ticket', ${i})"><div class="ticket-main"><div class="card-pic">${it.img?`<img src="${it.img}">`:'🎓'}</div><div style="flex:1"><b>${it.name}</b><br><small style="color:var(--high-school-blue)">${it.date} • ${it.venue}</small></div></div><div class="ticket-side"><small>SEAT</small><br><b>${it.area||''}区${it.num||''}</b></div><div class="del-btn" onclick="delItem(event, 'ticket', ${i})">×</div></div>` : `<div class="item-card" onclick="openEdit('wish', ${i})"><div class="del-btn" onclick="delItem(event, 'wish', ${i})">×</div><div class="card-pic">${it.img?`<img src="${it.img}">`:'🛍️'}</div><div style="flex:1"><b>${it.name}</b><br><small>₩${Number(it.price).toLocaleString()}</small></div></div>`;
            });
        }
    }

    function handleFileWithCompression(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas'); let w = img.width, h = img.height, max = 800;
                if(w > h) { if(w > max){ h *= max/w; w = max; } } else { if(h > max){ w *= max/h; h = max; } }
                canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                tempImg = canvas.toDataURL('image/jpeg', 0.7); document.getElementById('preview-text').innerHTML = `<img src="${tempImg}" style="max-width:100%; border-radius:10px;">`;
                if(curView === 'wish' || curView === 'fin') {
                    setTimeout(() => {
                        const nameIn = document.getElementById('f-name'), priceIn = document.getElementById('f-price');
                        if(nameIn) nameIn.value = "Seoul Item";
                        if(priceIn) { priceIn.value = "50000"; priceIn.dispatchEvent(new Event('input')); }
                    }, 500);
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function formatDateToShort(dateStr) { if(!dateStr) return curDate; const parts = dateStr.split('-'); return `${parts[1]}.${parts[2]}`; }

    function openEdit(view, idx) {
        curView = view; curIdx = idx; tempImg = ''; const form = document.getElementById('d-form'); const sync = document.getElementById('sync-area');
        document.getElementById('drawer').classList.add('active'); sync.innerHTML = '';
        const it = idx > -1 ? (view==='flight'?flights[idx]:store[view][idx]) : {};
        if(it.img) { tempImg = it.img; document.getElementById('preview-text').innerHTML = `<img src="${tempImg}" style="max-width:100%; border-radius:10px;">`; } else { document.getElementById('preview-text').innerHTML = '📸 点击上传/识图回填'; }
        const dVal = it.date ? (it.date.includes('-') ? it.date : `2026-${it.date.replace('.','-')}`) : `2026-${curDate.replace('.','-')}`;
        
        if(view === 'flight') {
            form.innerHTML = `<label class="f-label">航司</label><input id="f-air" class="f-input" value="${it.air||''}">
                <label class="f-label">航班 / 日期</label><div style="display:flex;gap:5px;"><input id="f-no" class="f-input" placeholder="航班号" value="${it.no||''}"> <input id="f-date-fl" class="f-input" type="date" value="${dVal}"></div>
                <label class="f-label">起降时间</label><div style="display:flex;gap:5px;"><input id="f-t1" class="f-input" type="time" value="${it.t1||'11:10'}"> <input id="f-t2" class="f-input" type="time" value="${it.t2||'14:00'}"></div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;"><div><label class="f-label">柜台</label><input id="f-c1" class="f-input" value="${it.c1||''}"></div><div><label class="f-label">登机</label><input id="f-g1" class="f-input" value="${it.g1||''}"></div><div><label class="f-label">座位</label><input id="f-s1" class="f-input" value="${it.s1||''}"></div></div>`;
        } else if(view === 'fin') {
            form.innerHTML = `<label class="f-label">日期</label><input id="f-date" class="f-input" type="date" value="${dVal}"><label class="f-label">项目</label><input id="f-name" class="f-input" value="${it.name||''}">
                <label class="f-label">方式</label><div id="pay-sel" class="selector-group"><div class="selector-item ${(!it.pay||it.pay==='信用卡')?'active':''}" onclick="selectPay(this)">信用卡</div><div class="selector-item ${(it.pay==='现金')?'active':''}" onclick="selectPay(this)">现金</div><div class="selector-item ${(it.pay==='韩币支付')?'active':''}" onclick="selectPay(this)">韩币支付</div></div>
                <div id="sub-pay-area" class="${(it.pay==='韩币支付')?'':'hidden'}"><div id="sub-pay-sel" class="selector-group"><div class="selector-item ${it.subPay==='Toss'?'active':''}" onclick="selectBtn(this)">Toss</div><div class="selector-item ${it.subPay==='Namane'?'active':''}" onclick="selectBtn(this)">Namane</div><div class="selector-item ${it.subPay==='TripPass'?'active':''}" onclick="selectBtn(this)">TripPass</div></div></div>
                <label class="f-label">金额 (₩)</label><input id="f-price" class="f-input" type="number" value="${it.price||''}" oninput="const hint=document.getElementById('cny-val'); if(hint) hint.innerText='≈ ¥'+(this.value/RATE).toFixed(1)"><div id="cny-val" class="cny-hint">≈ ¥${it.price?(it.price/RATE).toFixed(1):'0.0'}</div>`;
        } else if(view === 'plan') {
            form.innerHTML = `<label class="f-label">项目</label><input id="f-name" class="f-input" value="${it.name||''}">
                <div style="display:flex;gap:5px;"><div><label class="f-label">日期</label><input id="f-date-p" class="f-input" type="date" value="${dVal}"></div><div><label class="f-label">时间</label><input id="f-time" class="f-input" type="time" value="${it.time||'12:00'}"></div></div><label class="f-label">备注</label><input id="f-note" class="f-input" value="${it.note||''}">
                <label class="f-label">地图链接 (Naver)</label><input id="f-link" class="f-input" value="${it.link||''}">`;
        } else if(view === 'wish') {
            form.innerHTML = `<label class="f-label">项目名</label><input id="f-name" class="f-input" value="${it.name||''}">
                <label class="f-label">单价 (₩)</label><input id="f-price" class="f-input" type="number" value="${it.price||''}" oninput="const hint=document.getElementById('cny-val'); if(hint) hint.innerText='≈ ¥'+(this.value/RATE).toFixed(1)"><div id="cny-val" class="cny-hint">≈ ¥${it.price?(it.price/RATE).toFixed(1):'0.0'}</div>`;
            if(idx > -1) sync.innerHTML = `<button class="btn-main" style="background:#FFF0F6; color:var(--deep-pink); border:2.5px solid var(--sailor-pink); margin-top:10px;" onclick="syncToFin(${idx})">💸 同步至账本</button>`;
        } else if(view === 'ticket') {
            form.innerHTML = `<label class="f-label">活动名</label><input id="f-name" class="f-input" value="${it.name||''}">
                <div style="display:flex;gap:5px;"><div><label class="f-label">日期</label><input id="f-date-t" class="f-input" type="date" value="${dVal}"></div><div><label class="f-label">场馆</label><input id="f-venue" class="f-input" value="${it.venue||''}"></div></div>
                <label class="f-label">位置</label><div style="display:flex;gap:5px;"><input id="f-area" class="f-input" placeholder="区" value="${it.area||''}"> <input id="f-num" class="f-input" placeholder="号" value="${it.num||''}"></div>`;
        }
    }

    function selectBtn(el) { el.parentNode.querySelectorAll('.selector-item').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function selectPay(el) { selectBtn(el); document.getElementById('sub-pay-area').className = (el.innerText === '韩币支付' ? '' : 'hidden'); }
    function closeDrawer() { document.getElementById('drawer').classList.remove('active'); }
    function delItem(e, t, i) { e.stopPropagation(); if(confirm('确认删除？')){ if(t==='fin' && store.fin[i].subPay) wallet[store.fin[i].subPay]+=Number(store.fin[i].price); if(t==='flight') flights.splice(i,1); else store[t].splice(i,1); localCommit(); renderFlights(); renderList(); updateWalletUI(); } }
    
    function syncToFin(i) { 
        const it = store.wish[i]; 
        store.fin.unshift({ date: curDate, name: it.name, price: it.price, pay: '信用卡', subPay: '', img: it.img }); 
        alert('已同步，请在账本中查看'); closeDrawer(); nav('fin'); localCommit(); 
    }

    function masterSave() {
        const getV = (id) => document.getElementById(id) ? document.getElementById(id).value : '';
        const formatDate = (val) => val ? val.split('-').slice(1).join('.') : curDate;
        if(curView === 'flight') {
            const obj = { air: getV('f-air'), no: getV('f-no'), date: getV('f-date-fl'), t1: getV('f-t1'), t2: getV('f-t2'), c1: getV('f-c1'), g1: getV('f-g1'), s1: getV('f-s1') };
            if(curIdx > -1) flights[curIdx] = obj; else flights.push(obj);
        } else {
            const priceVal = Number(getV('f-price') || 0);
            const imgVal = tempImg || (curIdx > -1 ? store[curView][curIdx].img : '');
            if(curView === 'fin') {
                const payType = document.querySelector('#pay-sel .active').innerText;
                const subPayType = (payType === '韩币支付') ? document.querySelector('#sub-pay-sel .active').innerText : '';
                if(curIdx > -1) { // 修改旧记录，补回差价
                    const old = store.fin[curIdx];
                    if(old.subPay) wallet[old.subPay] += Number(old.price);
                    if(subPayType) wallet[subPayType] -= priceVal;
                } else if(subPayType) wallet[subPayType] -= priceVal;
                const obj = { date: formatDate(getV('f-date')), name: getV('f-name'), price: priceVal, pay: payType, subPay: subPayType, img: imgVal };
                if(curIdx > -1) store.fin[curIdx] = obj; else store.fin.unshift(obj);
                curDate = obj.date;
            } else if(curView === 'plan') {
                const obj = { date: formatDate(getV('f-date-p')), name: getV('f-name'), time: getV('f-time'), note: getV('f-note'), link: getV('f-link'), img: imgVal };
                if(curIdx > -1) store.plan[curIdx] = obj; else store.plan.push(obj);
                curDate = obj.date;
            } else if(curView === 'ticket') {
                const obj = { name: getV('f-name'), date: formatDate(getV('f-date-t')), venue: getV('f-venue'), area: getV('f-area'), num: getV('f-num'), img: imgVal };
                if(curIdx > -1) store.ticket[curIdx] = obj; else store.ticket.push(obj);
            } else if(curView === 'wish') {
                const obj = { name: getV('f-name'), price: priceVal, img: imgVal };
                if(curIdx > -1) store.wish[curIdx] = obj; else store.wish.unshift(obj);
            }
        }
        localCommit(); renderFlights(); renderList(); updateWalletUI(); closeDrawer();
    }
    init();
</script>
</body>
</html>
