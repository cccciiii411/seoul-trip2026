<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Seoul Moon🌙 Final Masterpiece</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        /* ================= 核心色彩与样式 ================= */
        :root { 
            --sailor-pink: #FF99CC; --sailor-purple: #D1B3FF; --sailor-blue: #A2D2FF; 
            --neon-pink: #FF007A; --soft-pink: #FFB6D9; --glow: rgba(255, 153, 204, 0.2); 
            --brown: #4D3B3B; --high-school-blue: #5D9CEC; --naver-green: #03C75A;
        }

        * { box-sizing: border-box; font-family: 'PingFang SC', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        ::-webkit-scrollbar { display: none; }

        body { 
            background: linear-gradient(-45deg, #FFF5F9, #F0F4FF, #EBF0FF, #FFF5F9);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            margin: 0; padding: env(safe-area-inset-top) 24px 120px 24px; 
            min-height: 100vh; overflow-x: hidden; 
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ✨ 标题区 ✨ */
        .sm-header-section { display: flex; flex-direction: column; align-items: center; margin: 15px 0 25px; position: relative; z-index: 10; }
        .sm-logo-wrap { display: inline-flex; align-items: center; justify-content: center; position: relative; }
        .shooting-star { position: absolute; top: -10px; left: -20px; width: 100px; height: 1.5px; background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1), rgba(255,255,255,0)); transform: rotate(35deg); animation: shooting 6s linear infinite; opacity: 0; z-index: 15; pointer-events: none; }
        @keyframes shooting { 0% { transform: translateX(-50px) translateY(-50px) rotate(35deg); opacity: 1; } 15% { transform: translateX(350px) translateY(250px) rotate(35deg); opacity: 0; } 100% { opacity: 0; } }
        
        .star-twinkle { position: absolute; color: white; filter: drop-shadow(0 0 5px rgba(255,255,255,0.9)); pointer-events: none; animation: twinkle 2s ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.7); } 100% { opacity: 1; transform: scale(1.1); } }
        
        .sm-title { font-family: 'Dancing Script', cursive; font-size: 62px; color: #FFFFFF; position: relative; display: inline-block; padding: 0 10px; margin: 0; cursor: pointer; z-index: 2; line-height: 1.1; }
        .sm-title::before { content: attr(data-text); position: absolute; left: 13px; top: 4px; z-index: -1; background: linear-gradient(90deg, #A2D2FF, #D1BFFF, #FF99CC, #D1BFFF, #A2D2FF); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: pastelFlow 4s linear infinite; }
        @keyframes pastelFlow { 0% { background-position: 0% 50%; } 100% { background-position: -200% 50%; } }
        .sm-moon-icon { position: absolute; right: -35px; top: -5px; animation: moonFloat 4s ease-in-out infinite alternate; }
        @keyframes moonFloat { 0% { transform: translateY(0px) rotate(-10deg); } 100% { transform: translateY(-4px) rotate(-18deg); } }
        .sm-subtitle { font-size: 10px; letter-spacing: 3px; color: #B19CD9; font-weight: 900; margin-top: 5px; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }

        /* 🗓️ 看板区 */
        .dash-board { background: rgba(255, 255, 255, 0.85); border: 2px solid white; border-radius: 35px; padding: 25px 22px; box-shadow: 0 12px 30px var(--glow); backdrop-filter: blur(15px); margin-bottom: 25px; position: relative; z-index: 5; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: nowrap; gap: 5px; margin-bottom: 20px; overflow: hidden; }
        .date-widget { display: flex; align-items: center; gap: 8px; flex-shrink: 1; min-width: 0; }
        .dash-date { font-family: "SF Pro Rounded", "Arial Rounded MT Bold", sans-serif; font-size: clamp(28px, 8vw, 42px); color: var(--soft-pink); font-weight: 900; letter-spacing: -1px; line-height: 1; text-shadow: 0 2px 5px rgba(255,153,204,0.15); white-space: nowrap; flex-shrink: 1; }
        .dash-day { background: #F0F6FF; color: var(--high-school-blue); padding: 5px 10px; border-radius: 14px; font-size: 11px; font-weight: 900; white-space: nowrap; flex-shrink: 0; transform: translateY(-2px); }
        .dash-rate { background: var(--sailor-pink); color: white; padding: 8px 12px; border-radius: 20px; font-size: 11px; font-weight: 900; box-shadow: 0 4px 10px rgba(255,153,204,0.3); white-space: nowrap; flex-shrink: 0; }
        
        /* 🛡️ 修复：看板标签滑动防拥挤 */
        .dash-tabs { display: flex; gap: 20px; border-bottom: 2.5px solid #F0F0F0; padding-bottom: 12px; margin-bottom: 15px; overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; }
        .d-tab { font-size: 15px; font-weight: 900; color: #999; cursor: pointer; position: relative; transition: 0.2s; white-space: nowrap; flex-shrink: 0; padding-bottom: 2px;}
        .d-tab.active { color: var(--neon-pink); }
        .d-tab.active::after { content: ''; position: absolute; bottom: -14.5px; left: 50%; transform: translateX(-50%); width: 28px; height: 4px; background: var(--neon-pink); border-radius: 4px; }

        /* 横向滚动与基础组件 */
        .scroll-row { display: flex !important; flex-wrap: nowrap; overflow-x: auto; gap: 12px; scrollbar-width: none; width: auto; margin-left: -24px; margin-right: -24px; padding: 12px 24px; }
        .w-item { min-width: 80px; text-align: center; background: white; padding: 15px 5px; border-radius: 20px; border: 1.5px solid #FFE4E1; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .date-item { padding: 12px 22px; background: rgba(255,255,255,0.7); border-radius: 22px; color: #999; font-weight: 900; border: 1.5px solid white; flex-shrink: 0; transition: 0.3s; cursor: pointer; }
        .date-item.active { background: var(--sailor-pink); color: white; border: none; box-shadow: 0 5px 15px rgba(255,153,204,0.4); transform: scale(1.05); }

        .chk-cats { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding: 15px 24px 20px; margin: 0 -24px; }
        .chk-cat-btn { padding: 9px 18px; font-size: 11px; background: rgba(255,255,255,0.8); color: var(--sailor-blue); border-radius: 16px; font-weight: 900; border: 1.5px solid #F0F6FF; white-space: nowrap; flex-shrink: 0; position: relative; transition: 0.3s; cursor: pointer; }
        .chk-cat-btn.active { background: var(--sailor-blue); color: white; border-color: var(--sailor-blue); transform: scale(1.05); box-shadow: 0 4px 12px rgba(162,210,255,0.4); }
        .chk-cat-del { position: absolute; top: -6px; right: -6px; background: white; color: #666; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 1.5px solid #EEE; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 5; }

        .chk-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px dashed #F0F0F0; animation: slideIn 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .chk-circle { width: 22px; height: 22px; border: 2px solid #E0E0E0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; cursor: pointer; flex-shrink: 0; }

        /* ================= 💬 Memo 气泡对话UI ================= */
        .memo-row { display: flex; justify-content: flex-end; align-items: flex-end; gap: 8px; margin-bottom: 12px; animation: slideIn 0.3s forwards; }
        .memo-bubble-wrapper { position: relative; max-width: 78%; }
        .memo-bubble { background: linear-gradient(135deg, var(--sailor-blue), #D1BFFF); color: white; padding: 12px 16px; border-radius: 20px 20px 4px 20px; font-size: 14px; font-weight: bold; box-shadow: 0 4px 12px rgba(162,210,255,0.4); word-wrap: break-word; line-height: 1.4; }
        .memo-time { font-size: 10px; color: #CCC; font-weight: bold; margin-bottom: 4px; text-align: right;}
        .memo-del { position: absolute; top: -6px; left: -6px; width: 20px; height: 20px; background: #FF4D4F; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(255,77,79,0.3); z-index: 5; transition:0.2s;}
        .memo-del:active { transform: scale(0.9); }

        /* ================= 📝 随手记 UI ================= */
        textarea.f-input { font-family: inherit; line-height: 1.6; font-weight: normal; color: var(--brown); height: 180px; resize: none; margin-bottom: 0; padding: 18px; border-radius: 20px; transition: 0.3s; }
        textarea.f-input:focus { border-color: var(--sailor-pink); box-shadow: 0 0 0 3px var(--glow); background: white !important;}

        /* ✈️ 航班卡片 */
        .f-card { flex: 0 0 88%; background: rgba(255,255,255,0.65); backdrop-filter: blur(12px); border: 3px solid var(--sailor-blue) !important; border-radius: 35px; padding: 25px; position: relative; flex-shrink: 0; box-shadow: 8px 8px 0px rgba(93,156,236,0.1); }
        .f-card.add-btn { border: 2.5px dashed #CCC !important; display: flex; flex-direction: column; color: #AAA; min-height: 180px; align-items: center; justify-content: center; background: transparent; box-shadow: none; cursor: pointer; }
        .f-time-row { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 10px; }
        .f-time-big { font-size: 36px; font-weight: 900; color: var(--brown); line-height: 1; }
        .f-tag-row { display: flex; gap: 8px; margin-top: 15px; border-top: 1.5px dashed rgba(0,0,0,0.08); padding-top: 15px; flex-wrap: wrap; }
        .f-tag { padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; background: white; color: var(--high-school-blue); border: 1.2px solid #EBF3FF; }

        /* 功能列表组件 */
        #list-container { position: relative; margin-top: 10px; }
        #list-container.has-timeline { padding-left: 20px; }
        #list-container.has-timeline::before { content: ''; position: absolute; left: 10px; top: 10px; bottom: 30px; width: 3px; background: linear-gradient(to bottom, var(--sailor-pink), var(--sailor-blue)); opacity: 0.5; border-radius: 3px; }
        .item-card { background: rgba(255,255,255,0.65); backdrop-filter: blur(12px); border: 1.5px solid rgba(255,255,255,0.8); padding: 20px; border-radius: 28px; display: flex; align-items: center; gap: 15px; margin-bottom: 18px; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.03); animation: bounceIn 0.5s forwards; opacity: 0; }
        @keyframes bounceIn { from { opacity: 0; transform: translateY(15px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        #list-container.has-timeline .item-card::before { content: ''; position: absolute; left: -16px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: white; border: 3px solid var(--sailor-pink); border-radius: 50%; z-index: 2; box-shadow: 0 0 8px rgba(255,153,204,0.6); }
        
        .icon-circle { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0; font-size: 24px; border: 1.5px solid #F0F0F0; overflow: hidden; position: relative; }
        .icon-circle img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: inherit; } 

        .del-btn-round { position: absolute; top: -10px; right: -10px; background: #FF4D4F; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 2.5px solid white; z-index: 20; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(255,77,79,0.4); }

        .nav-stack { display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 5; }
        .nav-row-half { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .nav-btn { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); border: 1.5px solid rgba(255, 255, 255, 0.8); border-radius: 28px; padding: 22px 10px; min-height: 80px; text-align: center; font-weight: 900; color: var(--brown); font-size: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.03); text-decoration: none; }
        .nav-btn:active { transform: scale(0.96); }
        .nav-pink-bar { background: var(--sailor-pink) !important; color: white !important; border: 1.5px solid white !important; box-shadow: 0 8px 20px rgba(255, 153, 204, 0.4) !important; }

        /* 🎫 终极票夹 3D UI */
        .ticket-list-item { background: linear-gradient(135deg, #7A89A6, #636C80); border-radius: 20px; display: flex; align-items: stretch; margin-bottom: 18px; height: 110px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); color: white; overflow: hidden; position: relative; cursor: pointer; }
        .ticket-list-poster { width: 100px; padding: 12px; flex-shrink: 0; display: flex; position: relative; }
        .ticket-list-poster img { position: absolute; inset: 12px; width: calc(100% - 24px); height: calc(100% - 24px); object-fit: cover; border-radius: 10px; }
        .ticket-list-stub { width: 85px; border-left: 2px dashed rgba(255,255,255,0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: rgba(0,0,0,0.1); }
        .ticket-list-stub::before, .ticket-list-stub::after { content: ''; position: absolute; left: -10px; width: 20px; height: 20px; border-radius: 50%; background: #FFF5F9; }
        .ticket-list-stub::before { top: -10px; } .ticket-list-stub::after { bottom: -10px; }

        .ticket-gallery-overlay { position: fixed; inset: 0; background: rgba(20,20,30,0.96); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 10000; display: none; flex-direction: column; opacity: 0; transition: 0.3s; }
        .ticket-gallery-overlay.active { display: flex; opacity: 1; }
        .gallery-viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; perspective: 1500px; transform-style: preserve-3d; overflow: hidden; width: 100%; }
        
        .典藏票根 { width: 290px; height: 500px; background: #FFF; border-radius: 25px; overflow: hidden; position: absolute; box-shadow: 0 20px 50px rgba(0,0,0,0.4); display: flex; flex-direction: column; transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s, z-index 0.4s; backface-visibility: hidden; }
        .典藏海报 { width: 100%; flex: 1; background: #EAEAEA; position: relative; display: block; border-bottom: 2px dashed rgba(0,0,0,0.1); }
        .典藏海报 img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
        .典藏信息 { position: relative; min-height: 200px; height: auto; background: rgba(25,25,30,0.8); backdrop-filter: blur(20px); color: #FFF; padding: 25px; display: flex; padding-bottom: 30px; }
        .典藏打孔 { position: absolute; left: -10px; top: 0; transform: translateY(-50%); width: 20px; height: 20px; border-radius: 50%; background: #000; z-index: 5; }

        /* 📸 抽屉与表单 */
        .pre-box { position: relative; width: 100%; height: 150px; background: rgba(255,255,255,0.7); border: 3px dashed #DDD; border-radius: 25px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; overflow: hidden; }
        #preview-text { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: absolute; inset: 0; z-index: 5; padding: 10px; }
        #preview-text img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: var(--sailor-pink); box-shadow: 0 0 20px var(--sailor-pink); display: none; z-index: 10; }
        .pre-box.scanning .scan-line { display: block; animation: scanAnim 2s infinite linear; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        .drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); display: none; align-items: flex-end; z-index: 11000; }
        .drawer.active { display: flex; }
        .drawer-content { background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); width: 100%; padding: 30px 25px 60px; border-radius: 45px 45px 0 0; max-height: 92vh; overflow-y: auto; border-top: 2.5px solid white; animation: slideUp 0.4s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .f-label { font-size: 13px; font-weight: 900; color: var(--brown); margin: 15px 0 8px; display: block; }
        .f-input { width: 100%; padding: 18px; background: #F8F9FA !important; border: 1.5px solid #EEE; border-radius: 22px; font-size: 15px; margin-bottom: 12px; transition: 0.3s; }
        .f-input:focus { border-color: var(--sailor-pink); box-shadow: 0 0 0 3px var(--glow); }

        .selector-group { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 10px 6px; margin: 0 -6px; }
        .selector-item { padding: 12px 20px; border: 1.5px solid white; border-radius: 18px; background: #F0F0F0; font-size: 12px; font-weight: 900; color: #999; flex-shrink: 0; transition: 0.2s; cursor: pointer; }
        .selector-item.active { background: var(--sailor-pink); color: white; transform: scale(1.05); box-shadow: 0 4px 10px var(--glow); }
        
        .tz-pill-box { display: flex; background: rgba(255,255,255,0.5); border-radius: 20px; padding: 4px; gap: 4px; border: 1.5px solid #F0F0F0; margin-bottom: 10px; }
        .tz-pill { flex: 1; padding: 14px; border-radius: 16px; text-align: center; font-size: 12px; font-weight: 900; color: #999; cursor: pointer; transition: 0.3s; }
        .tz-pill.active { background: white; color: var(--sailor-blue); box-shadow: 0 5px 12px rgba(0,0,0,0.06); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 20000; padding: 25px; }
        .modal-card { background: white; width: 100%; max-width: 320px; border-radius: 35px; padding: 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: popScale 0.3s; }
        @keyframes popScale { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="v-home">
        <div class="sm-header-section">
            <div class="sm-logo-wrap">
                <div class="shooting-star"></div>
                <span class="star-twinkle" style="top:-10px; left:12%; animation-duration:2.5s; font-size:16px;">✨</span>
                <span class="star-twinkle" style="bottom:10px; right:28%; animation-duration:3.2s; font-size:12px;">✨</span>
                <span class="star-twinkle" style="top:12px; right:-5%; animation-duration:4.7s; font-size:20px;">✦</span>
                <div style="position:relative; display:inline-block;">
                    <h1 class="sm-title" data-text="Seoul Moon" onclick="pop(); location.reload()">Seoul Moon</h1>
                    <svg class="sm-moon-icon" viewBox="0 0 100 100" width="40" height="40">
                        <defs><linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFF2CA" /><stop offset="100%" stop-color="#FFD1DC" /></linearGradient></defs>
                        <path d="M 75 10 A 40 40 0 1 0 75 90 A 50 50 0 0 1 75 10 Z" fill="url(#moonGrad)"/>
                    </svg>
                </div>
            </div>
            <div class="sm-subtitle" id="sm-dday-subtitle">· SEOUL TRIP JOURNAL ·</div>
        </div>

        <div class="dash-board">
            <div class="dash-header">
                <div class="date-widget">
                    <span id="live-date" class="dash-date">--.--</span>
                    <div class="dash-day">星期<span id="live-day">---</span></div>
                </div>
                <span id="live-rate" class="dash-rate">1 CNY ≈ -- ₩</span>
            </div>
            
            <div class="dash-tabs">
                <div id="tab-w" class="d-tab active" onclick="switchDash('weather')">🌤️ 天气</div>
                <div id="tab-c" class="d-tab" onclick="switchDash('checklist')">☑️ 清单</div>
                <div id="tab-m" class="d-tab" onclick="switchDash('memo')">💬 Memo</div>
                <div id="tab-n" class="d-tab" onclick="switchDash('note')">📝 随手记</div>
            </div>
            
            <div id="panel-w" class="scroll-row">气象精灵加载中...</div>
            
            <div id="panel-c" class="hidden">
                <div class="chk-cats scroll-row" id="chk-cat-row" style="margin-bottom:10px;"></div>
                <div id="chk-list" style="max-height: 160px; overflow-y: auto;"></div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <input type="text" id="chk-inp" class="f-input" style="margin-bottom:0; padding:12px; height:48px" placeholder="随手记一笔...">
                    <button class="nav-btn nav-pink-bar" style="min-height:0; width:55px; border-radius:18px; padding:0; font-size:24px;" onclick="addChk()">+</button>
                </div>
            </div>

            <div id="panel-m" class="hidden">
                <div id="memo-list" style="max-height: 180px; overflow-y: auto; padding: 10px 5px 0;"></div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <input type="text" id="memo-inp" class="f-input" style="margin-bottom:0; padding:12px 18px; height:48px;" placeholder="发送 Memo...">
                    <button class="nav-btn" style="min-height:0; width:65px; border-radius:18px; padding:0; font-size:14px; background:var(--sailor-blue); color:white; border:none;" onclick="addMemo()">发送</button>
                </div>
            </div>

            <div id="panel-n" class="hidden">
                <textarea id="note-area" class="f-input" placeholder="灵感随手记... (停笔自动保存)" oninput="saveNote(this.value)"></textarea>
            </div>
        </div>

        <div id="flight-list" class="scroll-row" style="padding-bottom:25px; margin-bottom:5px;"></div>

        <div class="nav-stack">
            <div class="nav-btn nav-pink-bar" onclick="nav('plan')">🗓️ 行程计划 PLAN</div>
            <div class="nav-row-half">
                <div class="nav-btn" onclick="nav('fin')">💰 记账本</div>
                <div class="nav-btn" onclick="nav('wish')">🛍️ 购物清单</div>
            </div>
            <div class="nav-btn" style="border:1.5px solid var(--sailor-purple)!important; color:var(--sailor-purple)!important;" onclick="nav('ticket')">🎓 票夹 TICKET BOX</div>
        </div>
    </div>

    <div id="v-sub" class="hidden" style="position:fixed; inset:0; background:linear-gradient(-45deg, #FFF5F9, #F0F4FF, #EBF0FF, #FFF5F9); z-index:1000; padding:24px; overflow-y:auto; padding-top:env(safe-area-inset-top); padding-bottom:120px;">
        <div style="color:var(--neon-pink); font-weight:900; margin-bottom:20px; font-size:18px; cursor:pointer;" onclick="nav('home')">← BACK</div>
        <div id="sub-header"></div>
        <div id="ledger-extra" class="hidden" style="margin-bottom:20px;">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
                <div class="nav-btn" style="padding:10px; min-height:65px; border-radius:20px;" onclick="promptWallet('Toss')"><small style="color:#999;">Toss</small><div id="val-Toss" style="font-size:13px;font-weight:900;">₩0</div></div>
                <div class="nav-btn" style="padding:10px; min-height:65px; border-radius:20px;" onclick="promptWallet('Namane')"><small style="color:#999;">Namane</small><div id="val-Namane" style="font-size:13px;font-weight:900;">₩0</div></div>
                <div class="nav-btn" style="padding:10px; min-height:65px; border-radius:20px;" onclick="promptWallet('TripPass')"><small style="color:#999;">TripPass</small><div id="val-TripPass" style="font-size:13px;font-weight:900;">₩0</div></div>
            </div>
        </div>
        <div id="list-container"></div>
        <button class="nav-btn nav-pink-bar" style="position:fixed; bottom:30px; left:24px; width:calc(100% - 48px); padding:22px; border-radius:45px; z-index:1001;" onclick="openEdit(curView, -1)">＋ 新增记录 ✨</button>
    </div>

    <div id="drawer" class="drawer" onclick="closeDrawer()">
        <div class="drawer-content" onclick="event.stopPropagation()">
            <div id="upload-zone" class="pre-box" onclick="pop(); document.getElementById('file-in').click()">
                <div class="scan-line"></div>
                <div id="preview-text">📸<br><small style="font-weight:900">拍照识图 / 添加封图</small></div>
                <input type="file" id="file-in" class="hidden" accept="image/*" onchange="handleSmartUpload(this)">
            </div>
            <div id="d-form"></div>
            <div id="sync-area"></div>
            <button class="nav-btn nav-pink-bar" style="width:100%; border-radius:45px; margin-top:20px;" onclick="masterSave()">确认并保存 ✨</button>
        </div>
    </div>

    <div id="ticket-gallery" class="ticket-gallery-overlay">
        <div style="padding: calc(env(safe-area-inset-top) + 15px) 25px; color: white; font-weight: 900; font-size: 18px; text-align: right; cursor: pointer;" onclick="closeTicketGallery()">DONE ✕</div>
        <div class="gallery-viewport" id="gallery-viewport"></div>
        <div style="padding: 30px; text-align: center; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: bold; letter-spacing: 3px;">← 左右滑动浏览 →</div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 id="modal-title" style="margin-top:0; color:var(--brown);">提示</h3>
            <div id="modal-msg" style="color:#666; font-size:14px; line-height:1.6; margin-top:10px;"></div>
            
            <div id="modal-sync-options" class="hidden">
                <div class="scroll-row" id="sync-pay-sel" style="justify-content:center; flex-wrap:wrap; margin-top:15px; padding:0;">
                    <div class="selector-item active" onclick="selectSyncPay(this)">信用卡</div>
                    <div class="selector-item" onclick="selectSyncPay(this)">现金</div>
                    <div class="selector-item" onclick="selectSyncPay(this)">Toss</div>
                    <div class="selector-item" onclick="selectSyncPay(this)">Namane</div>
                    <div class="selector-item" onclick="selectSyncPay(this)">TripPass</div>
                </div>
            </div>

            <input type="text" id="modal-inp" class="f-input hidden" style="margin-top:10px;">
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button class="nav-btn m-btn-cancel" style="flex:1; min-height:50px; border:none; padding:0" onclick="closeModal(false)">取消</button>
                <button class="nav-btn m-btn-ok" style="flex:1; min-height:50px; border:none; padding:0" onclick="closeModal(true)">确定</button>
            </div>
        </div>
    </div>

<script>
    /* ================= 工具函数置顶 ================= */
    const lb = (text) => `<div class="f-label" style="font-size:13px; font-weight:900; color:var(--brown); margin:15px 0 8px; display:block;">${text}</div>`;
    const pop = () => { try { if(window.navigator.vibrate) window.navigator.vibrate(15); } catch(e){} };
    function setTz(t, v, el) { pop(); if(t === 'single') sTz = v; else if(t === 'dep') dTz = v; else aTz = v; Array.from(el.parentNode.children).forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
    function updateCnyHint(v) { const el = document.getElementById('c-hint'); if(el) el.innerText = '≈ ¥ ' + (Number(v)/RATE).toFixed(1); }
    function selectBtn(el) { pop(); Array.from(el.parentNode.children).forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
    function selectPay(el) { selectBtn(el); document.getElementById('sub-pay-area').className = (el.innerText === '韩币' ? '' : 'hidden'); }
    function selectSyncPay(el) { selectBtn(el); }
    function closeDrawer() { document.getElementById('drawer').classList.remove('active'); }

    function showModal(t,m,i,cb){ 
        document.getElementById('modal-title').innerText=t; 
        document.getElementById('modal-msg').innerHTML=m; 
        if(i) document.getElementById('modal-inp').classList.remove('hidden'); 
        else document.getElementById('modal-inp').classList.add('hidden');
        document.getElementById('modal-inp').value='';
        document.getElementById('custom-modal').style.display='flex'; 
        modalCallback=cb; 
    }
    function closeModal(ok){ 
        document.getElementById('custom-modal').style.display='none'; 
        if(modalCallback) modalCallback(ok, document.getElementById('modal-inp').value); 
    }
    function promptWallet(t) { showModal("修改余额", "输入韩币金额:", true, (ok,v)=>{if(ok && !isNaN(v)){wallet[t]=Number(v);updateWalletUI();localCommit();}}); }
    function updateWalletUI() { if(document.getElementById('val-Toss')){document.getElementById('val-Toss').innerText='₩'+wallet.Toss.toLocaleString();document.getElementById('val-Namane').innerText='₩'+wallet.Namane.toLocaleString();document.getElementById('val-TripPass').innerText='₩'+wallet.TripPass.toLocaleString();} }
    function delItem(e,t,idx) { e.stopPropagation(); showModal("彻底删除?","此操作不可撤销！",false,ok=>{if(ok){if(t==='flight') flights.splice(idx,1); else store[t].splice(idx,1); localCommit(); initUI(); if(curView!=='home')renderList();}}); }

    /* ================= 数据引擎 ================= */
    const DB_NAME = 'SeoulMoon_Final_V15', STORE_NAME = 'appData', DATA_KEY = 'core_data';
    let wallet = { Toss: 0, Namane: 0, TripPass: 0 }, flights = [], store = { plan: [], ticket: [], wish: [], fin: [], checklist: [], chkCats: ['行李🧳', '购物🛍️', '办事📌'], memos: [], quickNote: '' };
    let curView = 'home', curIdx = -1, curDate = '04.29', RATE = 191.0, modalCallback = null, tempImg = '', dTz='上海', aTz='首尔', sTz='首尔', curCat='全部', activeChkCat='全部';

    const dbPromise = new Promise(resolve => { 
        const req = indexedDB.open(DB_NAME, 1); 
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME); 
        req.onsuccess = () => resolve(req.result); 
        req.onerror = () => resolve(null); 
    });

    async function bootApp() {
        try {
            const db = await dbPromise; if(!db) { initUI(); return; }
            const tx = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get(DATA_KEY);
            tx.onsuccess = () => { 
                if (tx.result) { 
                    wallet = tx.result.wallet || wallet; 
                    flights = tx.result.flights || flights; 
                    
                    const s = tx.result.store || {};
                    store.plan = s.plan || [];
                    store.ticket = s.ticket || [];
                    store.wish = s.wish || [];
                    store.fin = s.fin || [];
                    store.checklist = s.checklist || [];
                    store.chkCats = s.chkCats || ['行李🧳', '购物🛍️', '办事📌'];
                    
                    // 🛡️ 新增气泡引擎数据注入
                    store.memos = s.memos || [];
                    store.quickNote = s.quickNote || '';

                    if(store.ticket) store.ticket.sort((a,b) => (a.date||'9999-99-99').localeCompare(b.date||'9999-99-99'));
                } else { 
                    flights = [{ air: "韩亚航空", no: "OZ3625", date: "2026-04-29", t1: "10:55", t2: "14:00", tz1: "上海", tz2: "首尔", s1: "12A", c1: "A19", g1: "T2" }]; 
                }
                initUI(); 
            };
            tx.onerror = () => initUI();
        } catch(e) { initUI(); }
    }
    
    async function localCommit() { const db = await dbPromise; if(db) db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put({wallet, flights, store}, DATA_KEY); }

    function initUI() { 
        const n = new Date(); 
        document.getElementById('live-date').innerText = `${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')}`;
        document.getElementById('live-day').innerText = `${['日','一','二','三','四','五','六'][n.getDay()]}`;
        
        let dStr = (flights && flights.length > 0 && flights[0].date) ? flights[0].date.replace(/-/g, '/') : '2026/04/29';
        let diff = Math.ceil((new Date(dStr) - n)/86400000);
        document.getElementById('sm-dday-subtitle').innerText = `· SEOUL TRIP ${diff>=0?'D-'+diff:'D+'+Math.abs(diff)} ✈️ ·`;
        
        updateWeather(); updateExchangeRate(); renderFlights(); renderChkCats(); renderChk();
    }

    // 🛡️ 核心修复：支持四个 Tab 的丝滑切换
    function switchDash(v) { 
        pop(); 
        ['weather', 'checklist', 'memo', 'note'].forEach(tab => {
            const elTab = document.getElementById('tab-' + tab[0]);
            const elPanel = document.getElementById('panel-' + tab[0]);
            if(elTab) elTab.className = (v === tab) ? 'd-tab active' : 'd-tab';
            if(elPanel) elPanel.className = (v === tab) ? (tab === 'weather' ? 'scroll-row' : '') : 'hidden';
        });
        
        // 如果切到 Memo，就渲染气泡
        if(v === 'memo') renderMemo();
        // 如果切到随手记，就拉取存好的文本
        if(v === 'note') document.getElementById('note-area').value = store.quickNote || '';
    }

    function nav(v) { pop(); curView=v; document.getElementById('v-home').className=v==='home'?'':'hidden'; document.getElementById('v-sub').className=v==='home'?'hidden':''; document.getElementById('ledger-extra').className=v==='fin'?'':'hidden'; if(v!=='home') renderList(); else initUI(); updateWalletUI(); }

    /* ================= 💬 Memo 气泡对话引擎 ================= */
    function renderMemo() {
        const box = document.getElementById('memo-list');
        let h = '';
        if(!store.memos || store.memos.length === 0) {
            h = '<div style="text-align:center;padding:20px;color:#ccc;font-size:12px;font-weight:bold;">还没有备忘，快发一条吧~</div>';
        } else {
            store.memos.forEach((m, i) => {
                h += `
                <div class="memo-row">
                    <div class="memo-time">${m.time}</div>
                    <div class="memo-bubble-wrapper">
                        <div class="memo-del" onclick="delMemo(${i})">✖</div>
                        <div class="memo-bubble">${m.text}</div>
                    </div>
                </div>`;
            });
        }
        box.innerHTML = h;
        // 自动滚动到最新一条消息
        setTimeout(() => { box.scrollTop = box.scrollHeight; }, 50);
    }

    function addMemo() {
        const inp = document.getElementById('memo-inp');
        const v = inp.value.trim();
        if(!v) return;
        const n = new Date();
        const timeStr = String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
        if(!store.memos) store.memos = [];
        store.memos.push({ text: v, time: timeStr });
        inp.value = '';
        renderMemo();
        localCommit();
    }

    function delMemo(i) {
        pop();
        showModal("删除 Memo?", "确定要删除这条消息吗？", false, (ok) => {
            if(ok) {
                store.memos.splice(i, 1);
                renderMemo();
                localCommit();
            }
        });
    }

    /* ================= 📝 随手记：防抖无痕静默保存 ================= */
    let saveNoteTimeout;
    function saveNote(val) {
        store.quickNote = val;
        // 500ms 防抖，停笔半秒才写入数据库，极致顺滑不卡顿
        clearTimeout(saveNoteTimeout);
        saveNoteTimeout = setTimeout(() => { localCommit(); }, 500);
    }


    /* ================= 📋 清单系统 ================= */
    function renderChkCats() { const row = document.getElementById('chk-cat-row'); let h = `<div class="chk-cat-btn ${activeChkCat==='全部'?'active':''}" onclick="setChkCat('全部')">全部</div>`; store.chkCats.forEach((c, i) => { h += `<div class="chk-cat-btn ${activeChkCat===c?'active':''}" onclick="setChkCat('${c}')">${c} ${activeChkCat===c?`<span class="chk-cat-del" onclick="delChkCat(event, ${i})">✖</span>`:''}</div>`; }); row.innerHTML = h + `<div class="chk-cat-btn" style="border:1.5px dashed var(--sailor-purple);background:transparent;" onclick="addChkCat()">+ 新建</div>`; }
    function setChkCat(cat) { pop(); activeChkCat = cat; renderChkCats(); renderChk(); }
    function addChkCat() { showModal("新建分类", "名称 (支持Emoji):", true, (ok, val) => { if(ok && val.trim() && !store.chkCats.includes(val.trim())) { store.chkCats.push(val.trim()); activeChkCat = val.trim(); localCommit(); renderChkCats(); renderChk(); } }); }
    function delChkCat(e, idx) { e.stopPropagation(); pop(); const name = store.chkCats[idx]; showModal("删除分类?", `[${name}] 的记录将移至"其他"中。`, false, ok => { if(ok) { store.chkCats.splice(idx, 1); store.checklist.forEach(it => { if(it.cat === name) it.cat = '其他'; }); activeChkCat = '全部'; localCommit(); renderChkCats(); renderChk(); } }); }
    
    function renderChk() { 
        const box = document.getElementById('chk-list'); let h = ''; 
        store.checklist.forEach((it, i) => { 
            if(activeChkCat==='全部' || it.cat===activeChkCat) { 
                h += `<div class="chk-item"> <div class="chk-circle" style="${it.done?'background:var(--sailor-pink);border-color:var(--sailor-pink);':''}" onclick="toggleChk(${i})">${it.done?'✓ ':''}</div> <div style="flex:1; font-weight:600; font-size:14px; ${it.done?'text-decoration:line-through;color:#ccc':''}" onclick="toggleChk(${i})">${it.text} <small style="opacity:0.4; font-size:10px; margin-left:8px;">${it.cat}</small></div> <div style="display:flex;gap:15px;align-items:center;"><div style="color:#999;font-size:18px;cursor:pointer;" onclick="openEdit('checklist', ${i})">✎</div><div style="color:var(--neon-pink);font-size:18px;font-weight:bold;cursor:pointer;" onclick="delChk(${i})">✖</div></div> </div>`; 
            } 
        }); 
        box.innerHTML = h || '<div style="text-align:center;padding:20px;color:#ccc">空空如也~</div>'; 
    }
    function addChk() { const inp = document.getElementById('chk-inp'), v = inp.value.trim(); if(!v) return; store.checklist.unshift({text:v, cat:(activeChkCat==='全部'?'其他':activeChkCat), done:false}); inp.value=''; renderChk(); localCommit(); }
    function toggleChk(i) { store.checklist[i].done = !store.checklist[i].done; renderChk(); localCommit(); }
    function delChk(i) { store.checklist.splice(i,1); renderChk(); localCommit(); }

    /* ================= ✈️ 航班卡片 ================= */
    function renderFlights() {
        const list = document.getElementById('flight-list'); if(!list) return;
        list.innerHTML = flights.map((f, i) => `
            <div class="f-card" onclick="openEdit('flight', ${i})">
                <div class="del-btn-round" onclick="event.stopPropagation(); delItem(event, 'flight', ${i})">✖</div>
                <div style="font-weight:900;color:var(--sailor-blue);font-size:16px;">✈️ ${f.air||'--'} <span style="color:#999;font-size:12px;">${f.no||''}</span></div>
                <div class="f-time-row">
                    <div class="f-time-big">${f.t1||'--:--'}<small style="font-size:11px;display:block;opacity:0.4;font-weight:bold;margin-top:4px;">${f.tz1||'上海'}</small></div>
                    <div style="font-size:24px;opacity:0.1">✈️</div>
                    <div class="f-time-big" style="text-align:right;">${f.t2||'--:--'}<small style="font-size:11px;display:block;opacity:0.4;font-weight:bold;margin-top:4px;">${f.tz2||'首尔'}</small></div>
                </div>
                <div class="f-tag-row">
                    <div class="f-tag">柜台 ${f.c1||'-'}</div>
                    <div class="f-tag">登机口 ${f.g1||'-'}</div>
                    <div class="f-tag">座位 ${f.s1||'-'}</div>
                    <div class="f-tag" style="background:#F0F6FF; border:none; color:var(--sailor-blue)">${f.date}</div>
                </div>
            </div>`).join('') + `
            <div class="f-card add-btn" onclick="openEdit('flight', -1)">
                <div style="font-size:32px;margin-bottom:10px;">+</div>新增航班
            </div>`;
    }

    /* ================= 📋 子页面列表系统 (原生 <a> 标签唤醒 App) ================= */
    function renderList() {
        const box = document.getElementById('list-container'), header = document.getElementById('sub-header'); if(!box) return; box.innerHTML = '';
        const days = ['04.29','04.30','05.01','05.02','05.03'];
        
        if(curView==='plan') {
            box.className = 'has-timeline';
            header.innerHTML = `<div class="date-bar scroll-row" style="margin-bottom:15px;">` + days.map(d => `<div class="date-item ${curDate===d?'active':''}" onclick="curDate='${d}';renderList()">${d}</div>`).join('') + `</div>`;
            
            const ps = store.plan.filter(it => it.date === curDate).sort((a,b)=>a.time.localeCompare(b.time));
            
            const linkedPlans = ps.filter(p => p.link && p.link.trim() !== '');
            if(linkedPlans.length >= 1) {
                header.innerHTML += `<div class="nav-btn nav-pink-bar" style="min-height:0; padding:16px; border-radius:15px; font-size:13px; margin-bottom:20px;" onclick="genNaverTodayRoute()">🗺️ 今日 Naver 地图路线汇总</div>`;
            }

            ps.forEach(it => { 
                let mapBtn = (it.link && it.link.trim() !== '') ? `<a href="${it.link}" target="_blank" style="background:var(--naver-green);color:white;padding:6px 12px;border-radius:10px;font-size:10px;font-weight:900;text-decoration:none;display:inline-block;" onclick="event.stopPropagation();">📍 Map 直达</a>` : '';
                
                let memoBtn = '';
                if(it.memo && it.memo.trim() !== '') {
                    if(it.memo.startsWith('http')) {
                        memoBtn = `<a href="${it.memo}" target="_blank" style="background:var(--sailor-purple);color:white;padding:6px 12px;border-radius:10px;font-size:10px;font-weight:900;text-decoration:none;display:inline-block;" onclick="event.stopPropagation();">🔗 预定/详情</a>`;
                    } else {
                        memoBtn = `<span style="background:#F0F0F0;color:#999;padding:6px 12px;border-radius:10px;font-size:10px;font-weight:900;display:inline-block;">📝 ${it.memo}</span>`;
                    }
                }
                
                let btns = (mapBtn || memoBtn) ? `<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">${mapBtn}${memoBtn}</div>` : '';

                box.innerHTML += `
                <div class="item-card" onclick="openEdit('plan', ${store.plan.indexOf(it)})"> 
                    <div class="del-btn-round" onclick="event.stopPropagation(); delItem(event, 'plan', ${store.plan.indexOf(it)})">✖</div> 
                    <div class="icon-circle">📍</div> 
                    <div style="flex:1"><b>${it.name}</b><br><small style="color:#999;font-weight:bold;">${it.time} · ${it.tz||'首尔'}</small>${btns}</div> 
                </div>`; 
            });
            
        } else if(curView==='fin') {
            box.className = ''; header.innerHTML = '<div class="date-bar scroll-row">' + days.map(d => `<div class="date-item ${curDate===d?'active':''}" onclick="curDate='${d}';renderList()">${d}</div>`).join('') + '</div>';
            const Items = store.fin.filter(it => it.date === curDate);
            if(Items.length) { const total = Items.reduce((s,i)=>s+Number(i.price||0),0); box.innerHTML += `<div class="nav-btn nav-pink-bar" style="margin-bottom:20px;min-height:0;padding:20px;cursor:default"><div>今日支出</div><div style="font-size:28px;">₩${total.toLocaleString()}</div><small style="opacity:0.8;font-weight:bold;">≈ ¥ ${(total/RATE).toFixed(1)}</small></div>`; }
            Items.forEach(it => { box.innerHTML += `<div class="item-card" onclick="openEdit('fin', ${store.fin.indexOf(it)})"> <div class="del-btn-round" onclick="event.stopPropagation(); delItem(event, 'fin', ${store.fin.indexOf(it)})">✖</div> <div class="icon-circle" style="overflow:hidden;">${it.img?`<img src="${it.img}">`:'💰'}</div> <div style="flex:1"><b>${it.name}</b><br><small style="color:#999;font-weight:bold;">${it.cat} · ${it.subPay||it.pay}</small></div> <b style="color:var(--neon-pink);font-size:18px;">₩${Number(it.price).toLocaleString()}</b> </div>`; });

        if(curView==='flight') { if(curIdx>-1) flights[curIdx]=obj; else flights.push(obj); }
        else if(curView==='checklist') { obj.cat = document.querySelector('.selector-item.active')?.innerText || '其他'; if(curIdx>-1) store.checklist[curIdx]=obj; else store.checklist.push(obj); }
        else if(curView==='plan') { obj.date=obj.date.substring(5).replace('-','.'); if(curIdx>-1) store.plan[curIdx]=obj; else store.plan.push(obj); }
        else if(curView==='fin') { 
            obj.date=curDate; 
            obj.cat=document.querySelector('#f-cat-sel .active')?.innerText||'其他'; 
            obj.pay=document.querySelector('#p-sel .active')?.innerText||'现金'; 
            obj.subPay = (obj.pay === '韩币') ? (document.querySelector('#w-sel .active')?.innerText || 'Toss') : ''; 
            if(curIdx > -1 && store.fin[curIdx].subPay) { wallet[store.fin[curIdx].subPay] += Number(store.fin[curIdx].price); }
            if(obj.subPay) { wallet[obj.subPay] -= Number(obj.price); }
            if(curIdx>-1) store.fin[curIdx]=obj; else store.fin.push(obj); 
        }
        else if(curView==='wish') { obj.cat=document.querySelector('#c-sel .active')?.innerText||'其他'; if(curIdx>-1) store.wish[curIdx]=obj; else store.wish.push(obj); }
        else if(curView==='ticket') {

            store.ticket.sort((a,b) => (a.date||'9999-99-99').localeCompare(b.date||'9999-99-99'));

    }

    async function handleSmartUpload(input) {
        pop(); const r = new FileReader(); document.getElementById('upload-zone').classList.add('scanning');
        r.onload = (e) => {
            const img = new Image(); img.onload = async () => {
                const canvas = document.createElement('canvas'); let w = img.width, h = img.height, max = 800;
                if(w>h){ if(w>max){ h*=max/w; w=max; } }else{ if(h>max){ w*=max/h; h=max; } }
                canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img,0,0,w,h);
                tempImg = canvas.toDataURL('image/jpeg', 0.8);
                document.getElementById('preview-text').innerHTML = `<img src="${tempImg}">`;
                if(curView === 'ticket' || curView === 'plan' || curView === 'checklist') { document.getElementById('upload-zone').classList.remove('scanning'); return; }
                try {
                    const res = await Tesseract.recognize(tempImg, 'eng+kor');
                    const pr = (res.data.text.match(/[0-9]{1,3}(?:,[0-9]{3})+/g) || [res.data.text.match(/\d{4,}/g)])[0]?.toString().replace(/,/g,'') || "";
                    if(document.getElementById('f-price')) { document.getElementById('f-price').value = pr; updateCnyHint(pr); }
                    const name = res.data.text.split('\n').filter(l => l.trim().length > 3).sort((a,b)=>b.length-a.length)[0];
                    if(document.getElementById('f-name')) document.getElementById('f-name').value = name || "";
                    document.getElementById('upload-zone').classList.remove('scanning');
                } catch (err) { document.getElementById('upload-zone').classList.remove('scanning'); }
            }; img.src = e.target.result;
        }; r.readAsDataURL(input.files[0]);
    }

                        <div style="font-size:14px; color:var(--sailor-pink); font-weight:900; margin:2px 0;">${mon}</div>
                        <div style="font-size:42px; color:#FFF; font-weight:900; line-height:1;">${day}</div>
                    </div>
                </div>
            </div>`;
        });
    }

    function updateGalleryTransforms(delta = 0) {
        galleryCurrentIdx = Math.max(0, Math.min(store.ticket.length - 1, galleryCurrentIdx + delta));
        for (let i = 0; i < store.ticket.length; i++) {
            const card = document.getElementById(`gallery-card-${i}`);
            if(!card) continue;
            let offset = i - galleryCurrentIdx;

            if (offset === 0) {
                card.style.transform = `translateX(0px) translateZ(0px) rotateY(0deg)`;
                card.style.zIndex = 10; card.style.opacity = 1;
                card.style.pointerEvents = 'auto';
            } else if (offset > 0) {
                card.style.transform = `translateX(${30 + (offset * 20)}px) translateZ(${offset * -150}px) rotateY(-15deg)`;
                card.style.zIndex = 10 - offset; card.style.opacity = offset > 2 ? 0 : 0.8; 
                card.style.pointerEvents = 'none'; 
            } else {
                card.style.transform = `translateX(-150%) translateZ(200px) rotateY(10deg)`;
                card.style.opacity = 0; card.style.zIndex = 0;
                card.style.pointerEvents = 'none';
            }
        }
    }

    let tsX = 0;
    function bindGallerySwipes() {
        const v = document.getElementById('ticket-gallery');
        v.ontouchstart = (e) => tsX = e.touches[0].clientX;
        v.ontouchend = (e) => {
            const teX = e.changedTouches[0].clientX;
            if (tsX - teX > 50) { if(galleryCurrentIdx < store.ticket.length -1) { pop(); updateGalleryTransforms(1); } } 
            else if (teX - tsX > 50) { if(galleryCurrentIdx > 0) { pop(); updateGalleryTransforms(-1); } }
        };
    }

    async function updateWeather() { try { const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul`); const djson=await r.json(); document.getElementById('panel-w').innerHTML=djson.daily.time.map((date,i)=>`<div class="w-item"><small>${date.slice(5).replace('-','.')}</small><br><span style="font-size:24px;">${djson.daily.weathercode[i]>50?'🌧️':'⛅'}</span><br><b style="font-size:11px;color:var(--sailor-pink);">${Math.round(djson.daily.temperature_2m_min[i])}/${Math.round(djson.daily.temperature_2m_max[i])}°</b></div>`).join(''); } catch(e){} }
    async function updateExchangeRate() { try { const r=await fetch('https://open.er-api.com/v6/latest/CNY'); const djson=await r.json(); RATE=djson.rates.KRW; document.getElementById('live-rate').innerText=`1 CNY ≈ ${RATE.toFixed(1)} ₩`; } catch(e){} }
    
    bootApp();
</script>
</body>
</html>
